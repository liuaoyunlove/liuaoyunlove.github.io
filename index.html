<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DSM Mitumba Orders · Kariakoo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d0b1e;--bg2:#141228;--bg3:#1c1938;--card:rgba(255,255,255,.04);
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.14);
  --gold:#f59e0b;--gold2:#fbbf24;--goldbg:rgba(245,158,11,.12);
  --green:#10b981;--red:#ef4444;--blue:#6366f1;
  --orange:#f97316;--purple:#a855f7;--cyan:#06b6d4;
  --text:#f1f5f9;--t2:rgba(255,255,255,.62);--t3:rgba(255,255,255,.30);
  --r:14px;--rs:8px;--shadow:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'DM Sans','Noto Sans SC',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
a,button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}

#auth-wrap{position:fixed;inset:0;overflow-y:auto;
  background:linear-gradient(160deg,#0d0b1e 0%,#1a0800 50%,#0d0b1e 100%);
  display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 40px;z-index:800}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:52px;background:var(--bg2);border-bottom:1px solid var(--bdr);gap:10px}
#main-wrap{flex:1;overflow:hidden;display:flex}
#sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);
  overflow-y:auto;padding:8px 0}
#page{flex:1;overflow-y:auto;padding:14px 14px 80px}
#bnav{display:none;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--bdr)}

.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:28px 22px;width:100%;max-width:400px;box-shadow:var(--shadow);margin-top:20px}
.auth-icon{width:68px;height:68px;border-radius:16px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-weight:900;font-size:13px;color:#000;
  box-shadow:0 8px 28px rgba(245,158,11,.35)}
.auth-h{font-size:20px;font-weight:900;margin-bottom:3px;text-align:center}
.auth-sub{font-size:11px;color:var(--t3);text-align:center;margin-bottom:20px}
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tab{flex:1;padding:8px;border-radius:var(--rs);font-size:13px;font-weight:700;
  text-align:center;cursor:pointer;background:var(--card);color:var(--t2);border:1px solid var(--bdr)}
.tab.on{background:var(--goldbg);color:var(--gold);border-color:var(--gold)}

.brand{display:flex;align-items:center;gap:9px}
.brand-mark{width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:9px;color:#000}
.brand-name{font-size:14px;font-weight:800}
.brand-loc{font-size:9px;color:var(--t3)}
.topbar-r{display:flex;align-items:center;gap:8px}
.bell{position:relative;width:34px;height:34px;border-radius:var(--rs);
  background:var(--card);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;border:1px solid var(--bdr)}
.bell-dot{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:1px 4px;border-radius:99px;min-width:15px;text-align:center;display:none}
.lang{display:flex;gap:4px}
.lbtn{padding:4px 9px;border-radius:99px;font-size:11px;font-weight:700;
  cursor:pointer;background:transparent;color:var(--t3);border:1px solid var(--bdr)}
.lbtn.on{background:var(--goldbg);color:var(--gold);border-color:rgba(245,158,11,.4)}
.av{width:32px;height:32px;border-radius:50%;background:var(--goldbg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--gold);font-size:13px;cursor:pointer}

.nav-g{padding:6px 10px 2px;font-size:9px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.08em}
.nav-i{display:flex;align-items:center;gap:10px;padding:8px 12px;
  cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;
  transition:all .15s;position:relative;border-radius:6px;margin:0 6px}
.nav-i:hover{background:var(--card);color:var(--text)}
.nav-i.on{background:var(--goldbg);color:var(--gold);font-weight:700}
.nav-i.on::before{content:'';position:absolute;left:-6px;top:25%;bottom:25%;
  width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-ic{width:20px;text-align:center;font-size:16px}
.nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:99px;min-width:16px;text-align:center}

.bnav-i{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 4px 9px;cursor:pointer;color:var(--t3);font-size:9px;
  font-weight:700;gap:3px;transition:color .15s;position:relative}
.bnav-i.on{color:var(--gold)}
.bni{font-size:21px;line-height:1}

.fg{margin-bottom:13px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.inp{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);border-radius:var(--rs);color:var(--text);font-size:14px;transition:border .15s}
.inp:focus{border-color:rgba(245,158,11,.5)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:#1c1938}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.inp{resize:vertical;min-height:72px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:700;
  transition:all .15s;cursor:pointer;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}
.btn-dark{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--bdr)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.btn-orange{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.btn-blue{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.25)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-lg{padding:13px;font-size:15px;width:100%}
.w100{width:100%}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px}
.card-disc{border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.04)}
.c-title{font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.stat-c{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:13px}
.stat-lbl{font-size:10px;color:var(--t3);font-weight:700;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:900}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}

.badge{display:inline-flex;align-items:center;padding:3px 8px;
  border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24}
.b-green{background:rgba(16,185,129,.15);color:#34d399}
.b-blue{background:rgba(99,102,241,.15);color:#a5b4fc}
.b-red{background:rgba(239,68,68,.15);color:#f87171}
.b-orange{background:rgba(249,115,22,.15);color:#fb923c}
.b-purple{background:rgba(168,85,247,.15);color:#c084fc}
.b-gray{background:rgba(255,255,255,.07);color:var(--t2)}
.b-cyan{background:rgba(6,182,212,.15);color:#67e8f9}

.flow{display:flex;align-items:flex-start;overflow-x:auto;padding:6px 0;gap:0}
.flow-s{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.flow-d{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;
  border:2px solid var(--bdr);background:var(--bg3);color:var(--t3)}
.flow-d.done{background:var(--green);border-color:var(--green);color:#fff}
.flow-d.active{background:var(--gold);border-color:var(--gold);color:#000}
.flow-d.fail{background:var(--red);border-color:var(--red);color:#fff}
.flow-lbl{font-size:9px;color:var(--t3);margin-top:3px;white-space:nowrap;max-width:52px;text-align:center;overflow:hidden;text-overflow:ellipsis}
.flow-arr{color:var(--t3);font-size:12px;margin:0 2px;padding-bottom:18px}

.o-card{border-radius:var(--r);padding:13px;margin-bottom:10px;
  background:var(--card);border:1px solid var(--bdr);cursor:pointer;transition:border .15s}
.o-card:hover{border-color:var(--bdr2)}
.o-card.disc{border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.04)}
.o-id{font-family:monospace;font-size:13px;font-weight:800}
.o-big{font-size:20px;font-weight:900}
.o-orig{font-size:11px;text-decoration:line-through;color:var(--t3)}

.p-grid{border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr)}
.p-row{display:grid;grid-template-columns:1fr auto;gap:8px;
  padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.p-row.three{grid-template-columns:1fr auto auto}
.p-row:last-child{border-bottom:none}
.p-row.sel{background:rgba(245,158,11,.06)}
.p-row.disc{background:rgba(249,115,22,.06)}
.p-name{font-size:13px;font-weight:600}
.p-code{font-size:10px;color:var(--t3);font-family:monospace}
.av-ok{color:var(--green)}.av-no{color:var(--red)}.av-low{color:var(--orange)}
.p-kp{font-size:13px;font-weight:700;color:var(--t2)}
.p-kd{font-size:12px;font-weight:800;color:var(--orange)}
.p-ks{font-size:11px;text-decoration:line-through;color:var(--t3)}
.stepper{display:flex;align-items:center;gap:4px}
.st-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:700;cursor:pointer;user-select:none}
.st-btn:active{transform:scale(.82)}
.st-minus{background:rgba(255,255,255,.08);color:var(--t2)}
.st-plus{background:var(--gold);color:#000}
.st-n{width:38px;height:28px;text-align:center;background:rgba(255,255,255,.06);
  border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:13px;
  font-weight:700;-moz-appearance:textfield}
.st-n::-webkit-inner-spin-button{display:none}
.disc-inp{width:56px;height:28px;text-align:center;background:rgba(249,115,22,.1);
  border:1px solid rgba(249,115,22,.3);border-radius:6px;color:var(--orange);
  font-size:12px;font-weight:700;-moz-appearance:textfield}
.disc-inp::-webkit-inner-spin-button{display:none}

.cart-bar{position:sticky;top:0;z-index:10;background:var(--bg2);
  border:1px solid var(--bdr);border-radius:var(--r);padding:9px 13px;
  margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.cb-tot{font-size:22px;font-weight:900;color:var(--gold)}

.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pay-btn{padding:10px 6px;border-radius:var(--rs);background:var(--card);
  border:2px solid var(--bdr);text-align:center;cursor:pointer;
  font-size:12px;font-weight:700;transition:all .15s;color:var(--t2)}
.pay-btn.on{border-color:var(--gold);color:var(--gold);background:var(--goldbg)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px)}
.overlay.mid{align-items:center;padding:16px}
.mbox{background:var(--bg2);border:1px solid var(--bdr);
  border-radius:var(--r) var(--r) 0 0;width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;padding:20px 16px;
  box-shadow:0 -10px 40px rgba(0,0,0,.6)}
.overlay.mid .mbox{border-radius:var(--r)}
.m-title{font-size:16px;font-weight:900;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between}
.mx{font-size:22px;color:var(--t3);cursor:pointer;line-height:1;padding:4px}
.mx:hover{color:var(--text)}

.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:300px}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.tr{text-align:right}.tc{text-align:center}

.notice{padding:9px 12px;border-radius:var(--rs);font-size:12px;line-height:1.55;margin-bottom:10px}
.n-gold{background:var(--goldbg);border:1px solid rgba(245,158,11,.3);color:var(--gold)}
.n-orange{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:#fb923c}
.n-blue{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.n-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.n-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#34d399}
.disc-banner{background:linear-gradient(90deg,#c2410c,#ea580c);
  padding:7px 13px;border-radius:var(--rs) var(--rs) 0 0;
  font-size:12px;font-weight:700;color:#fff;margin:-14px -14px 12px}

#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:#1e293b;border:1px solid var(--bdr);border-radius:99px;
  padding:9px 20px;font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:88vw}
#toast.show{opacity:1}
#toast.success{border-color:var(--green);color:#34d399}
#toast.error{border-color:var(--red);color:#f87171}
#toast.info{border-color:var(--gold);color:var(--gold)}

.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);
  border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
.spin-lg{width:36px;height:36px;border-width:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.c-spin{display:flex;align-items:center;justify-content:center;padding:55px}

.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.gap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.page-h{font-size:18px;font-weight:900;margin-bottom:14px}
.sub{font-size:12px;color:var(--t2);margin-top:2px}
.mono{font-family:monospace;font-size:12px}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.gold{color:var(--gold)}.green{color:var(--green)}.red{color:var(--red)}
.orange{color:var(--orange)}.t3{color:var(--t3)}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.py8{padding:8px 0}.border-b{border-bottom:1px solid rgba(255,255,255,.06)}
.empty{text-align:center;color:var(--t3);padding:48px 0;font-size:13px}
.err{color:var(--red);padding:20px;font-size:13px}
.filt{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.f-btn{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:700;
  cursor:pointer;background:var(--card);color:var(--t2);border:1px solid var(--bdr)}
.f-btn.on{border-color:var(--gold);color:var(--gold)}

@media(max-width:768px){
  #sidebar{display:none!important}
  #bnav{display:flex}
  #page{padding:10px 9px 80px}
  .row2{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:769px){#bnav{display:none!important}}
</style>
</head>
<body>
<div id="auth-wrap"></div>
<div id="app" style="display:none">
  <div id="topbar">
    <div class="brand">
      <div class="brand-mark">DSM</div>
      <div><div class="brand-name">DSM Mitumba</div><div class="brand-loc">Kigogo · Kariakoo 🇹🇿</div></div>
    </div>
    <div class="topbar-r">
      <div class="lang">
        <button class="lbtn on" id="l-en" onclick="setLang('en')">EN</button>
        <button class="lbtn" id="l-zh" onclick="setLang('zh')">中</button>
      </div>
      <div class="bell" onclick="openNotifs()">🔔<span class="bell-dot" id="bell-dot"></span></div>
      <div class="av" id="av" onclick="goPage('profile')">?</div>
    </div>
  </div>
  <div id="main-wrap">
    <div id="sidebar"><div id="snav"></div></div>
    <div id="page"></div>
  </div>
  <div id="bnav" style="display:flex"></div>
</div>
<div id="toast"></div>
<script>
// CONFIG
const GAS_URL = "https://script.google.com/macros/s/AKfycbysm2KowCaenaeBbK_5-oW_-3XtAk-f0r8kIzv1KnMeIF4Vx_3AFhh4EQ7TnxHjgsaf/exec";

// STATE
let S = {
  user: null, lang: localStorage.getItem("lang")||"en",
  cart: {}, cartCid: null, page: "",
};

// API
async function api(action, data={}) {
  const body = JSON.stringify({action, requesterId:S.user?.id||"", ...data});
  const res = await fetch(GAS_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body});
  const j = await res.json();
  if (!j.ok) throw new Error(j.error||"Error");
  return j.data;
}

// UTILS
const $ = id => document.getElementById(id);
const html = (id, h) => { const el=$(id); if(el) el.innerHTML=h; };
function fmtK(n){ const v=Math.round(Number(n||0)); return v>=1000000?(v/1000000).toFixed(1)+"M":v>=1000?Math.floor(v/1000)+"K":v.toString(); }
function fmtFull(n){ return Number(n||0).toLocaleString()+" TZS"; }
function roundK(n){ return Math.floor(Number(n)/1000)*1000; }

let _toT;
function toast(msg,type="info"){
  const el=$("toast"); el.textContent=msg; el.className="show "+type;
  clearTimeout(_toT); _toT=setTimeout(()=>el.className="",3000);
}
function modal(body,opts={}){
  const d=document.createElement("div");
  d.className=opts.center?"overlay mid":"overlay"; d.id="modal-overlay";
  d.innerHTML=`<div class="mbox">${body}</div>`;
  d.addEventListener("click",e=>{if(e.target===d)closeModal();});
  document.body.appendChild(d);
}
function closeModal(){const m=$("modal-overlay");if(m)m.remove();}
function setLang(l){S.lang=l;localStorage.setItem("lang",l);
  $("l-en").classList.toggle("on",l==="en");$("l-zh").classList.toggle("on",l==="zh");}

const SC={
  submitted:            {en:"Pending Review",zh:"待审批",b:"b-yellow"},
  pending_super_discount:{en:"Discount Approval",zh:"折扣待审批",b:"b-orange"},
  sales_approved:       {en:"Awaiting Payment",zh:"待付款",b:"b-blue"},
  sales_rejected:       {en:"Rejected",zh:"已拒绝",b:"b-red"},
  finance_confirmed:    {en:"Ready to Ship",zh:"待发货",b:"b-purple"},
  shipped:              {en:"Shipped",zh:"已发货",b:"b-cyan"},
  completed:            {en:"Completed",zh:"已完成",b:"b-green"},
  cancelled:            {en:"Cancelled",zh:"已取消",b:"b-gray"},
};
function sbadge(s){const c=SC[s]||{en:s,zh:s,b:"b-gray"};return `<span class="badge ${c.b}">${S.lang==="zh"?c.zh:c.en}</span>`;}
function flowBar(status){
  const steps=["submitted","sales_approved","finance_confirmed","shipped","completed"];
  const labels={submitted:"Submit",sales_approved:"Sales ✓",finance_confirmed:"Payment",shipped:"Shipped",completed:"Done"};
  const labelsZh={submitted:"提交",sales_approved:"销售审批",finance_confirmed:"付款",shipped:"发货",completed:"完成"};
  const cur=steps.indexOf(status); const fail=["cancelled","sales_rejected"].includes(status);
  return `<div class="flow">${steps.map((s,i)=>{
    let cls=""; if(i<cur)cls="done"; else if(i===cur&&!fail)cls="active"; else if(i===cur&&fail)cls="fail";
    const lbl=S.lang==="zh"?labelsZh[s]:labels[s];
    return `<div class="flow-s"><div class="flow-d ${cls}">${i+1}</div><div class="flow-lbl">${lbl}</div></div>${i<steps.length-1?'<div class="flow-arr">›</div>':""}`
  }).join("")}</div>`;
}

  });
  html_=`<div class="row mb12"><div class="page-h mb0">🛒 ${c.name}</div>

    html_+=`<div class="p-row three ${qty>0?"sel":""} ${da>0?"disc":""}" id="pr-${p.id}">
      <div><div class="p-name">${p.name}</div><div class="p-code">${p.code}</div>
        <div class="sub ${av>5?"av-ok":av>0?"av-low":"av-no"}">${av>0?`✓ ${av} avail`:"✗ Out of stock"}</div>
      </div>
      <div style="text-align:right;min-width:60px">
        ${da>0?`<div class="p-ks">${Math.round(p.unitPrice/1000)}K</div><div class="p-kd">${Math.round(fp/1000)}K</div>`:
               `<div class="p-kp">${Math.round(p.unitPrice/1000)}K</div>`}
        ${canDisc?`<div style="display:flex;align-items:center;gap:3px;margin-top:4px;justify-content:flex-end">
          <input class="disc-inp" type="number" min="0" step="1"
            value="${da>0?Math.round(da/1000):""}" placeholder="disc"
            onchange="setDiscount('${p.id}',this.value)"
            onclick="event.stopPropagation()">
          <span style="font-size:10px;color:var(--t3)">K</span></div>`:""}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="stepper">
          <div class="st-btn st-minus" onclick="cartAdj('${c.id}','${p.id}',${av},-1)">−</div>
          <input class="st-n" id="stn-${p.id}" type="number" min="0" value="${qty}"
            onchange="cartSet('${c.id}','${p.id}',${av},this.value)">
          <div class="st-btn st-plus" onclick="cartAdj('${c.id}','${p.id}',${av},1)"
            ${av===0?"style='opacity:.35'":""}>+</div>
        </div>
        ${qty>0?`<div class="sub orange fw7" id="isub-${p.id}">${fmtK(roundK(fp*qty))}</div>`:
                `<div class="sub orange fw7" id="isub-${p.id}" style="display:none"></div>`}
      </div>
    </div>`;
    // Store product data for cart
    window._pdata = window._pdata||{};
    window._pdata[p.id]={...p,productId:p.id};
  });
  html_+=`</div>`;
  html("page",html_);
}

function cartAdj(cid,pid,avail,delta){
  const p=window._pdata?.[pid]; if(!p)return;
  if(!S.cart[pid])S.cart[pid]={...p,qty:0,discountAmt:0};
  const maxQ=Number(avail)||999;
  S.cart[pid].qty=Math.max(0,Math.min(maxQ,S.cart[pid].qty+delta));
  if(S.cart[pid].qty===0)delete S.cart[pid];
  S.cartCid=cid; _refreshRow(pid); _refreshCartBar();
}
function cartSet(cid,pid,avail,val){
  const p=window._pdata?.[pid]; if(!p)return;
  const q=Math.max(0,Math.min(Number(avail)||999,parseInt(val)||0));
  if(q===0)delete S.cart[pid];
  else{if(!S.cart[pid])S.cart[pid]={...p,qty:0,discountAmt:0}; S.cart[pid].qty=q;}
  S.cartCid=cid; _refreshRow(pid); _refreshCartBar();
}
function setDiscount(pid,valK){
  if(S.cart[pid])S.cart[pid].discountAmt=Math.round((parseFloat(valK)||0)*1000);
  _refreshCartBar();
}
function _refreshRow(pid){
  const row=document.getElementById("pr-"+pid); if(!row)return;
  const it=S.cart[pid], qty=it?.qty||0, da=it?.discountAmt||0;
  const p=window._pdata?.[pid]; if(!p)return;
  const fp=p.unitPrice-da;
  row.classList.toggle("sel",qty>0); row.classList.toggle("disc",da>0);
  const stn=document.getElementById("stn-"+pid); if(stn)stn.value=qty;
  const isub=document.getElementById("isub-"+pid);
  if(isub){isub.textContent=qty>0?fmtK(roundK(fp*qty)):""; isub.style.display=qty>0?"block":"none";}
}
function _refreshCartBar(){
  const items=Object.values(S.cart).filter(v=>v?.productId&&v.qty>0);
  let tq=0,tot=0,disc=0;
  items.forEach(it=>{tq+=it.qty;const fp=it.unitPrice-(it.discountAmt||0);tot+=roundK(fp*it.qty);disc+=(it.discountAmt||0)*it.qty;});
  const meta=document.getElementById("cb-meta"), totEl=document.getElementById("cb-tot"), btn=document.getElementById("cb-btn");
  if(meta)meta.textContent=tq+" bales selected";
  if(totEl)totEl.textContent=fmtK(roundK(tot))+" TZS";
  if(btn)btn.disabled=tq===0;
}
function openCheckout(cid){
  const items=Object.values(S.cart).filter(v=>v?.productId&&v.qty>0);
  if(!items.length)return toast("Select items first","error");
  let sub=0,disc=0; items.forEach(it=>{const fp=it.unitPrice-(it.discountAmt||0);sub+=roundK(fp*it.qty);disc+=(it.discountAmt||0)*it.qty;});
  const hasDisc=items.some(i=>(i.discountAmt||0)>0);
  modal(`<div class="m-title">📋 Confirm Order <span class="mx" onclick="closeModal()">×</span></div>
  ${hasDisc?`<div class="notice n-orange mb10">⚠️ This order has discounted items. Discounts >100K/item need super admin approval.</div>`:""}
  <div class="card mb12">
    ${items.map(it=>`<div class="row py8 border-b">
      <div>${it.name} <span class="mono t3">×${it.qty}</span></div>
      <div class="fw7 ${(it.discountAmt||0)>0?"orange":"gold"}">${fmtK(roundK((it.unitPrice-(it.discountAmt||0))*it.qty))}</div>
    </div>`).join("")}
    <div class="row mt8 fw9"><span>TOTAL</span><span class="gold">${fmtK(roundK(sub))} TZS</span></div>
  </div>
  <div class="fg"><label class="lbl">Payment Method</label>
    <div class="pay-grid" id="pay-g">
      ${["Cash","M-Pesa","Tigo Pesa","Bank","Credit","Airtel"].map(m=>`<div class="pay-btn ${m==="Cash"?"on":""}" onclick="selPay(this,'${m}')">${m}</div>`).join("")}
    </div></div>
  <div id="credit-wrap" style="display:none">
    <div class="fg"><label class="lbl">Credit Due Date</label>
      <input class="inp" id="cdue" type="date" min="${new Date().toISOString().slice(0,10)}"></div>
  </div>
  <div class="fg"><label class="lbl">Note (optional)</label>
    <textarea class="inp" id="onote" rows="2" placeholder="Any notes..."></textarea></div>
  <button class="btn btn-gold w100 btn-lg mt8" onclick="submitOrder('${cid}')">Submit Order</button>`);
}
function selPay(el,m){
  document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("on")); el.classList.add("on");
  const cw=$("credit-wrap"); if(cw)cw.style.display=m==="Credit"?"block":"none";
}
async function submitOrder(cid){
  const payEl=document.querySelector(".pay-btn.on"), pay=payEl?.textContent?.trim()||"Cash";
  const note=$("onote")?.value?.trim()||"", cdue=$("cdue")?.value||"";
  if(pay==="Credit"&&!cdue)return toast("Set credit due date","error");
  const items=Object.values(S.cart).filter(v=>v?.productId&&v.qty>0);
  if(!items.length)return toast("No items","error");
  const hasDisc=items.some(i=>(i.discountAmt||0)>0);
  if(hasDisc&&!confirm("⚠️ Order has discounts. Submit?"))return;
  try{
    const r=await api("submitOrder",{containerId:cid,items:items.map(i=>({
      productId:i.id||i.productId,productCode:i.code,productName:i.name,
      unitPrice:i.unitPrice,discountAmt:Math.round((i.discountAmt||0)/1000)*1000,qty:i.qty
    })),payMethod:pay,note,creditDue:cdue});
    S.cart={}; closeModal(); toast(`Order ${r.id} submitted ✓`,"success"); goPage("my_orders");
  }catch(e){toast(e.message,"error");}
}

function openOrd(oid,va){
  api("getOrder",{orderId:oid}).then(o=>{
    modal(`<div class="m-title">📋 ${o.id}<span class="mx" onclick="closeModal()">×</span></div>
    ${o.hasDiscount?`<div class="disc-banner">🏷️ Discounted Order</div>`:""}
    <div class="mb10">${flowBar(o.status)}</div>
    <div class="card mb10">
      <div class="row mb8"><div><div class="fw8">${o.customerName}</div><div class="sub">${o.customerPhone}</div></div>${sbadge(o.status)}</div>
      <div class="sub">📦 ${o.containerName} · 💳 ${o.payMethod}</div>
      ${o.creditDue?`<div class="sub">📅 Credit due: ${o.creditDue}</div>`:""}
      ${o.note?`<div class="sub">📝 ${o.note}</div>`:""}
      ${o.rejectReason?`<div class="sub red mt8">✗ Reason: ${o.rejectReason}</div>`:""}
    </div>
    <div class="c-title">Items</div>
    <div class="p-grid mb10">
      ${(o.items||[]).map(i=>`<div class="p-row">
        <div><div class="p-name">${i.productName}</div><div class="p-code">${i.productCode} ×${i.qty}</div></div>
        <div style="text-align:right">
          ${Number(i.discountAmt||0)>0
            ?`<div class="p-ks">${Math.round(i.unitPrice/1000)}K</div><div class="p-kd">${Math.round((i.finalPrice||i.unitPrice)/1000)}K</div>`
            :`<div class="p-kp">${Math.round(i.unitPrice/1000)}K</div>`}
        </div>
        <div class="fw7 gold tr">${fmtK(i.subtotal)}</div>
      </div>`).join("")}
      <div class="p-row" style="background:var(--goldbg)">
        <div class="fw8">TOTAL</div><div></div><div class="tr fw9 gold">${fmtK(o.total)}</div>
      </div>
    </div>
    ${oActions(o,va)}`);
  }).catch(e=>toast(e.message,"error"));
}
function oActions(o,va){
  const u=S.user,s=o.status; let b=[];
  if(va==="customer"){
    if(s==="submitted"){b.push(`<button class="btn btn-dark btn-sm" onclick="closeModal();toast('Edit coming soon','info')">✏️ Edit</button>`);
      b.push(`<button class="btn btn-red btn-sm" onclick="doCancelOrder('${o.id}')">✗ Cancel</button>`);}
  }
  if(["reviewer","super"].includes(va)){
    if(s==="submitted"||s==="pending_super_discount"){
      if(u.role==="super"||s==="submitted"){
        b.push(`<button class="btn btn-green btn-sm" onclick="doSalesApprove('${o.id}')">✅ Approve</button>`);
        b.push(`<button class="btn btn-red btn-sm" onclick="doSalesReject('${o.id}')">✗ Reject</button>`);
        b.push(`<button class="btn btn-orange btn-sm" onclick="closeModal();openDiscount('${o.id}')">🏷️ Discount</button>`);
      }
      if(s==="pending_super_discount"&&u.role==="super"){
        b.push(`<button class="btn btn-gold btn-sm" onclick="doSuperDiscount('${o.id}')">✅ Approve Discount</button>`);
      }
    }
  }
  if(["finance","super"].includes(va)){
    if(s==="sales_approved")b.push(`<button class="btn btn-gold btn-sm" onclick="closeModal();openFinConfirm('${o.id}','${o.payMethod}')">💳 Confirm Payment</button>`);
  }
  if(["warehouse","super"].includes(va)){
    if(s==="finance_confirmed")b.push(`<button class="btn btn-green btn-sm" onclick="doShip('${o.id}')">🚚 Ship</button>`);
    if(s==="shipped"){b.push(`<button class="btn btn-gold btn-sm" onclick="doComplete('${o.id}')">✅ Complete</button>`);
      b.push(`<button class="btn btn-orange btn-sm" onclick="doCancelOrder('${o.id}')">↩ Undo</button>`);}
  }
  if(u.role==="super"&&s==="cancelled")b.push(`<button class="btn btn-dark btn-sm" onclick="doUndoCancel('${o.id}')">↩ Restore</button>`);
  return b.length?`<div class="gap mt10">${b.join("")}</div>`:"";
}
async function doCancelOrder(oid){const r=prompt("Reason (optional):")||"";
  try{await api("cancelOrder",{orderId:oid,reason:r});closeModal();toast("Cancelled","info");if(S.page==="my_orders")loadMO();else loadReview();}catch(e){toast(e.message,"error");}}
async function doSalesApprove(oid){if(!confirm(`Approve ${oid}? This locks stock.`))return;
  try{await api("salesApprove",{orderId:oid});closeModal();toast("Approved ✓","success");loadReview();}catch(e){toast(e.message,"error");}}
async function doSalesReject(oid){const r=prompt("Rejection reason:");if(!r)return;
  try{await api("salesReject",{orderId:oid,reason:r});closeModal();toast("Rejected","info");loadReview();}catch(e){toast(e.message,"error");}}
async function doSuperDiscount(oid){if(!confirm("Approve large discount?"))return;
  try{await api("superApproveDiscount",{orderId:oid});closeModal();toast("Discount approved ✓","success");loadReview();}catch(e){toast(e.message,"error");}}
async function doShip(oid){if(!confirm(`Ship order ${oid}?`))return;
  try{await api("shipOrder",{orderId:oid});closeModal();toast("Shipped ✓","success");loadWH();}catch(e){toast(e.message,"error");}}
async function doComplete(oid){if(!confirm(`Mark ${oid} completed?`))return;
  try{await api("completeOrder",{orderId:oid});closeModal();toast("Completed ✓","success");loadWH();}catch(e){toast(e.message,"error");}}
async function doUndoCancel(oid){if(!confirm("Restore this order?"))return;
  try{await api("undoCancel",{orderId:oid});closeModal();toast("Restored ✓","success");loadAllOrders();}catch(e){toast(e.message,"error");}}

async function filterRV(s){_rvf=s;document.querySelectorAll("[id^='rvf-']").forEach(e=>e.classList.remove("on"));$("rvf-"+s)?.classList.add("on");await loadReview();}
async function loadReview(){
  try{const ords=await api("getOrders",{status:_rvf==="all"?undefined:_rvf});
    const el=$("rv-list");
    if(!ords?.length){el.innerHTML=`<div class="empty">No orders</div>`;return;}
    el.innerHTML=ords.map(o=>oCard(o,"reviewer")).join("");

function openDiscount(oid){
  api("getOrder",{orderId:oid}).then(o=>{
    modal(`<div class="m-title">🏷️ Apply Discount — ${oid}<span class="mx" onclick="closeModal()">×</span></div>
    <div class="notice n-orange mb10">Discount &gt;100K/item requires super admin approval</div>
    <div class="p-grid mb10">
      ${(o.items||[]).map(i=>`<div class="p-row">
        <div><div class="p-name">${i.productName}</div><div class="p-code">${i.productCode} · ${Math.round(i.unitPrice/1000)}K</div></div>
        <div style="display:flex;align-items:center;gap:4px">
          <input class="disc-inp" id="di-${i.productCode}" type="number"
            value="${Math.round((i.discountAmt||0)/1000)}" placeholder="0">
          <span class="t3" style="font-size:10px">K</span>
        </div>
      </div>`).join("")}
    </div>
    <button class="btn btn-gold w100" onclick="submitDiscount('${oid}',${JSON.stringify((o.items||[]).map(i=>i.productCode))})">Apply Discount</button>`);
  });
}
async function submitDiscount(oid,codes){
  const discountItems=codes.map(c=>({productCode:c,discountAmt:Math.round((parseFloat(document.getElementById("di-"+c)?.value)||0)*1000)})).filter(d=>d.discountAmt>0);
  if(!discountItems.length)return toast("No discount entered","error");
  try{const r=await api("applyDiscount",{orderId:oid,discountItems});
    closeModal(); toast(r.needsSuperApproval?"Needs super admin approval":"Discount applied ✓","info"); loadReview();}
  catch(e){toast(e.message,"error");}
}

async function pgCustomers(){
  html("page",`<div class="page-h">👥 My Customers</div>
  <div id="cust-l"><div class="c-spin"><span class="spin spin-lg"></span></div></div>`);
  try{
    const users=await api("getUsers",{role:"customer"});
    const pend=users.filter(u=>u.status==="pending"), act=users.filter(u=>u.status==="active");
    let out="";
    if(pend.length)out+=`<div class="notice n-orange mb10">⏳ ${pend.length} pending approval</div>`+pend.map(u=>custCard(u,true)).join("")+`<div class="c-title mt12">Active</div>`;
    out+=act.map(u=>custCard(u,false)).join("");
    if(!users.length)out=`<div class="empty">No customers yet</div>`;
    html("cust-l",out);
  }catch(e){html("cust-l",`<div class="err">${e.message}</div>`);}
}
function custCard(u,pend){
  return `<div class="card mb8">
    <div class="row">
      <div style="flex:1">
        <div class="gap mb4"><span class="fw8">${u.name}</span>
          <span class="badge ${u.status==="active"?"b-green":"b-yellow"}">${u.status}</span>
          ${!u.address&&!u.district?`<span class="badge b-orange">⚠️ No address</span>`:""}
        </div>
        <div class="sub">📱 ${u.phone} · 🆔 ${u.id}</div>
        ${u.district?`<div class="sub">📍 ${u.district}${u.address?", "+u.address:""}</div>`:
          `<div class="sub red">⚠️ No address — update for delivery</div>`}
      </div>
      ${pend?`<div class="gap" style="flex-direction:column">
        <button class="btn btn-green btn-sm" onclick="doApprove('${u.id}')">✓ Approve</button>
        <button class="btn btn-red btn-sm" onclick="toast('Contact super admin to reject','info')">✗</button>
      </div>`:`<div class="sub">${u.assignedTo===S.user.id?"⭐ Mine":""}</div>`}
    </div>
  </div>`;
}
async function doApprove(uid){
  try{await api("approveUser",{userId:uid,assignTo:S.user.id});toast("Approved ✓","success");pgCustomers();}
  catch(e){toast(e.message,"error");}
}

async function loadFinSum(){
  try{

    const pendRev=all.reduce((s,o)=>s+Number(o.total||0),0);
    const todayRev=todayConf.reduce((s,o)=>s+Number(o.total||0),0);
    html("fin-sum",`<div class="stat-grid mb12">
      <div class="stat-c"><div class="stat-lbl">Pending Payment</div>
        <div class="stat-val">${all.length}</div><div class="stat-sub">${fmtK(pendRev)} TZS</div></div>
      <div class="stat-c"><div class="stat-lbl">Today Confirmed</div>
        <div class="stat-val">${todayConf.length}</div><div class="stat-sub">${fmtK(todayRev)} TZS</div></div>
    </div>`);
  }catch{}
}

async function filterWH(t){_wht=t;document.querySelectorAll("[id^='wht-']").forEach(e=>e.classList.remove("on"));$("wht-"+t)?.classList.add("on");await loadWH();}
async function loadWH(){
  const el=$("wh-l");
  try{
    if(_wht==="ship"){
      const ords=await api("getOrders",{status:"finance_confirmed"});
      if(!ords?.length){el.innerHTML=`<div class="empty">Nothing to ship</div>`;return;}
      el.innerHTML=ords.map(o=>`<div class="o-card">
        <div class="row mb8">
          <div style="flex:1"><div class="gap mb4"><span class="o-id">${o.id}</span>${sbadge(o.status)}</div>
            <div class="sub">👤 ${o.customerName} · ${o.customerPhone}</div>
            ${o.items?`<div class="sub">📦 ${o.items.length} items</div>`:""}
          </div><div class="o-big gold tr">${fmtK(o.total)}</div>
        </div>
        <div class="gap">
          <button class="btn btn-green btn-sm" onclick="doShip('${o.id}')">🚚 Ship Now</button>
          <button class="btn btn-dark btn-sm" onclick="openOrd('${o.id}','warehouse')">View</button>
        </div>
      </div>`).join("");
    }else if(_wht==="shipped"){
      const ords=await api("getOrders",{status:"shipped"});
      if(!ords?.length){el.innerHTML=`<div class="empty">No shipped orders</div>`;return;}
      el.innerHTML=ords.map(o=>`<div class="o-card">
        <div class="row mb8">
          <div style="flex:1"><div class="gap mb4"><span class="o-id">${o.id}</span>${sbadge(o.status)}</div>
            <div class="sub">👤 ${o.customerName}</div>
            <div class="sub">Shipped: ${new Date(o.shippedAt||"").toLocaleDateString()}</div>
          </div><div class="o-big gold tr">${fmtK(o.total)}</div>
        </div>
        <div class="gap">
          <button class="btn btn-gold btn-sm" onclick="doComplete('${o.id}')">✅ Complete</button>
          <button class="btn btn-dark btn-sm" onclick="openOrd('${o.id}','warehouse')">View</button>
        </div>
      </div>`).join("");
    }else if(_wht==="stock"){
      const ctrs=await api("getContainers",{includeAll:true});
      let out="";
      for(const c of ctrs.filter(c=>c.status==="active")){
        const full=await api("getContainer",{containerId:c.id});
        if(!(full.products||[]).length)continue;
        out+=`<div class="card mb10"><div class="c-title">${c.name}</div>
          <div class="tw"><table><thead><tr><th>Product</th><th>Code</th>
            <th class="tr">Total</th><th class="tr">Avail</th><th class="tr">Reserved</th></tr></thead>
          <tbody>${full.products.map(p=>`<tr>
            <td class="fw7">${p.name}</td><td class="mono t3">${p.code}</td>
            <td class="tr">${p.qty||0}</td>
            <td class="tr ${Number(p.available||0)>0?"green":"red"}">${p.available||0}</td>
            <td class="tr orange">${p.reserved||0}</td>
          </tr>`).join("")}</tbody></table></div></div>`;
      }
      el.innerHTML=out||`<div class="empty">No active containers</div>`;
    }
  }catch(e){el.innerHTML=`<div class="err">${e.message}</div>`;}
}

// ── STOCKTAKE ─────────────────────────────────────────────────────────
async function pgStocktake(){
  html("page",`<div class="page-h">🔢 Stocktake</div>
  <div id="stk-l"><div class="c-spin"><span class="spin spin-lg"></span></div></div>`);
  try{
    const ctrs=await api("getContainers",{includeAll:true});
    const active=ctrs.filter(c=>c.status==="active");
    let out=`<div class="notice n-blue mb10">Perform physical stock count for each container.</div>`;
    out+=active.map(c=>`<div class="card mb8" style="cursor:pointer" onclick="startStocktake('${c.id}','${c.name.replace(/'/g,"\\'")}')">
      <div class="row"><div><div class="fw8">${c.name}</div>
        <div class="sub">Available: ${c.availableQty||0} · Reserved: ${c.reservedQty||0}</div></div>
        <button class="btn btn-gold btn-sm">Start Count →</button>
      </div></div>`).join("");
    if(!active.length)out+=`<div class="empty">No active containers</div>`;
    // History
    try{
      const hist=await api("getStocktakes");
      if(hist?.length){
        out+=`<div class="c-title mt16 mb8">Recent Stocktakes</div>`;
        out+=hist.slice(0,15).map(r=>`<div class="card mb6">
          <div class="row"><div><div class="fw7">${r.productName||r.productId}</div>
            <div class="sub">System:${r.systemQty} → Counted:${r.countedQty}
              <span class="${r.diff<0?"red":r.diff>0?"orange":""} fw7"> ${r.diff>0?"+":""}${r.diff}</span>
              ${r.note?` · ${r.note}`:""}</div>
            <div style="font-size:10px;color:var(--t3)">${new Date(r.submittedAt||"").toLocaleString()}</div>
          </div>
          <span class="badge ${r.status==="approved"?"b-green":r.status==="rejected"?"b-red":"b-yellow"}">${r.status}</span>
          </div>
          ${r.status==="pending"&&S.user.role==="super"?`<div class="gap mt8">
            <button class="btn btn-green btn-sm" onclick="approveStk('${r.id}',true)">✅ Approve & Adjust</button>
            <button class="btn btn-dark btn-sm" onclick="approveStk('${r.id}',false)">✗ Reject</button>
          </div>`:""}
        </div>`).join("");
      }
    }catch{}
    html("stk-l",out);
  }catch(e){html("stk-l",`<div class="err">${e.message}</div>`);}
}
async function startStocktake(cid,cname){
  const c=await api("getContainer",{containerId:cid});
  const prods=c.products||[];
  modal(`<div class="m-title">🔢 ${cname}<span class="mx" onclick="closeModal()">×</span></div>
  <div class="notice n-blue mb10">Enter physically counted quantities. Leave blank if unchanged.</div>
  <div class="p-grid mb12">
    ${prods.map(p=>`<div class="p-row">
      <div><div class="p-name">${p.name}</div><div class="p-code">${p.code}</div>
        <div class="sub t3">System: ${p.qty||0} · Avail: ${p.available||0}</div></div>
      <div>
        <input class="st-n" type="number" id="sc-${p.id}" value="${p.qty||0}" min="0"
          style="width:62px;height:34px;font-size:14px">
      </div>
      <div><input class="inp" id="sn-${p.id}" placeholder="Note"
        style="width:80px;padding:5px;font-size:11px"></div>
    </div>`).join("")}
  </div>
  <button class="btn btn-gold w100" onclick="doStocktake('${cid}',${JSON.stringify(prods.map(p=>({id:p.id,name:p.name,qty:p.qty||0})))})">
    Submit Count
  </button>`);
}
async function doStocktake(cid,prods){
  const counts=prods.map(p=>({productId:p.id,productName:p.name,systemQty:p.qty,
    countedQty:parseInt(document.getElementById("sc-"+p.id)?.value||p.qty),
    note:document.getElementById("sn-"+p.id)?.value?.trim()||""}));
  try{await api("submitStocktake",{containerId:cid,counts});
    closeModal();toast("Stocktake submitted ✓","success");pgStocktake();}
  catch(e){toast(e.message,"error");}
}
async function approveStk(id,adjust){
  try{await api("approveStocktake",{stocktakeRowId:id,adjust});
    toast(adjust?"Adjusted ✓":"Rejected","info");pgStocktake();}
  catch(e){toast(e.message,"error");}
}

  <div id="imp-preview"></div>`);
}
function previewImport(input, cid){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const hdr=rows[0].map(h=>String(h||"").toLowerCase().trim());
      const codeI=hdr.indexOf("code"), nameI=hdr.indexOf("name"),
            priceI=hdr.findIndex(h=>h.includes("price")||h.includes("unit")),
            qtyI=hdr.findIndex(h=>h.includes("qty")||h.includes("quantity"));
      const data=rows.slice(1).filter(r=>r[codeI]).map(r=>({
        code:String(r[codeI]||"").trim(),
        name:String(r[nameI]||"").trim(),
        unitPrice:parseInt(r[priceI]||0),
        qty:parseInt(r[qtyI]||0)
      })).filter(r=>r.code&&r.name);
      html("imp-preview",`<div class="notice n-green mb10">${data.length} products ready to import</div>
        <div class="tw"><table><thead><tr><th>Code</th><th>Name</th><th class="tr">Price</th><th class="tr">Qty</th></tr></thead>
        <tbody>${data.slice(0,10).map(p=>`<tr><td class="mono">${p.code}</td><td>${p.name}</td>
          <td class="tr">${p.unitPrice.toLocaleString()}</td><td class="tr">${p.qty}</td></tr>`).join("")}
        ${data.length>10?`<tr><td colspan="4" class="tc t3">... +${data.length-10} more</td></tr>`:""}</tbody></table></div>
        <button class="btn btn-gold w100 mt10" onclick="doImport('${cid}',${JSON.stringify(JSON.stringify(data)).replace(/</g,"&lt;")})">
          Import ${data.length} Products
        </button>`);
      window._importData=data;
    }catch(e){html("imp-preview",`<div class="err">Parse error: ${e.message}</div>`);}
  };
  reader.readAsArrayBuffer(file);
}
async function doImport(cid){
  const data=window._importData; if(!data?.length)return toast("No data","error");
  try{const r=await api("importProducts",{containerId:cid,products:data});
    closeModal();toast(`Imported ${r.imported} products ✓`,"success");loadMgmt();}
  catch(e){toast(e.message,"error");}
}

      </div>
    </div>
    ${u.district?`<div class="sub">📍 ${u.district}${u.address?", "+u.address:""}</div>`:""}
  </div>
  <div class="card mb12">
    <div class="c-title">Change Password</div>
    <div class="fg"><label class="lbl">Old Password</label><input class="inp" id="op" type="password"></div>
    <div class="fg"><label class="lbl">New Password</label><input class="inp" id="np" type="password"></div>
    <button class="btn btn-gold btn-sm" onclick="doChangePw()">Update Password</button>
  </div>
  <div class="card mb12">
    <div class="c-title">Change Phone</div>
    <div class="fg"><label class="lbl">New Phone Number</label><input class="inp" id="nph" type="tel" placeholder="255712..."></div>
    <div class="fg"><label class="lbl">Confirm with Password</label><input class="inp" id="cpw" type="password"></div>
    <button class="btn btn-dark btn-sm" onclick="doChangePhone()">Update Phone</button>
  </div>
  <button class="btn btn-red btn-sm w100" onclick="doLogout()">🚪 Logout</button>`);
}
async function doChangePw(){
  const op=$("op")?.value, np=$("np")?.value;
  if(!op||!np)return toast("Fill both fields","error");
  if(np.length<4)return toast("Min 4 chars","error");
  try{await api("updatePassword",{oldPw:op,newPw:np});toast("Password updated ✓","success");$("op").value="";$("np").value="";}
  catch(e){toast(e.message,"error");}
}
async function doChangePhone(){
  const ph=$("nph")?.value?.trim(), pw=$("cpw")?.value?.trim();
  if(!ph||!pw)return toast("Fill all fields","error");
  try{await api("updatePhone",{newPhone:ph,pw});toast("Phone updated ✓","success");S.user.phone=ph;}
  catch(e){toast(e.message,"error");}
}
function doLogout(){
  if(!confirm("Logout?"))return;
  S.user=null; S.cart={}; localStorage.removeItem("u");
  $("app").style.display="none"; showAuth("login");
}

// ── INIT ───────────────────────────────────────────────────────────────
(function(){
  const saved=localStorage.getItem("u");
  if(saved){try{S.user=JSON.parse(saved);startApp();}catch{showAuth();}}
  else showAuth();
  setLang(S.lang);
})();
</script>
</body>
</html>
