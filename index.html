async function addProduct(cid) {
  const code  = $('np-code')?.value?.trim();
  const name  = $('np-name')?.value?.trim();
  const priceK = parseFloat($('np-price')?.value)||0;
  if (!code||!name||!priceK) return toast('Fill Code, Name, and Price','error');
  try {
    const existing = await GET('products',`container_id=eq.${cid}`,`id`);
    const sortOrder = (existing?.length||0)+1;
    await POST('products',{
      id:`${cid}_${code}`, container_id:cid, code, name,
      unit_price:Math.round(priceK*1000), sort_order:sortOrder
    });
    toast('Product added ✓','success');
    openProductsMgmt(cid);
  } catch(e) { toast(e.message,'error'); }
}

async function saveAllProducts(cid) {
  const products = await GET('products',`container_id=eq.${cid}`,'*');
  let saved=0;
  for (const p of (products||[])) {
    const code  = $('pc-'+p.id)?.value?.trim();
    const name  = $('pn-'+p.id)?.value?.trim();
    const priceK = parseFloat($('pp-'+p.id)?.value)||0;
    if (!code||!name||!priceK) continue;
    await PATCH('products',`id=eq.${p.id}`,{code,name,unit_price:Math.round(priceK*1000)});
    saved++;
  }
  toast(`${saved} products saved ✓`,'success');
  closeModal();
}

async function deleteProduct(pid, cid) {
  if (!confirm('Delete this product? This cannot be undone if stock/orders exist.')) return;
  try {
    await DELETE('products',`id=eq.${pid}`);
    await DELETE('stock',`product_id=eq.${pid}`);
    toast('Product deleted','info');
    openProductsMgmt(cid);
  } catch(e) { toast(e.message,'error'); }
}

async function importProductsCSV(cid) {
  const input = document.createElement('input');
  input.type='file'; input.accept='.csv';
  input.onchange = async () => {
    const file = input.files[0]; if(!file) return;
    const text = await file.text();
    const lines = text.split('\n').filter(l=>l.trim());
    const existing = await GET('products',`container_id=eq.${cid}`,'id');
    let added=0;
    for (let i=1;i<lines.length;i++) { // skip header
      const cols = lines[i].split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      if (cols.length<3) continue;
      const [code,name,priceStr] = cols;
      const price = parseFloat(priceStr)||0;
      if (!code||!name||!price) continue;
      try {
        await POST('products',{
          id:`${cid}_${code}`,container_id:cid,code,name,
          unit_price:Math.round(price*1000),sort_order:(existing?.length||0)+added+1
        });
        added++;
      } catch {}
    }
    toast(`${added} products imported ✓`,'success');
    openProductsMgmt(cid);
  };
  input.click();
}

  const rows = await GET('stocktake',`container_id=eq.${cid}`,'*');
  rows?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
  const pending = (rows||[]).filter(r=>r.status==='pending');
  modal(`
    <div class="modal-title">📋 Stocktakes: ${cid}
      <span class="modal-x" onclick="closeModal()">×</span></div>
    ${pending.length?`<div class="notice notice-orange mb10">⚠️ ${pending.length} pending reviews</div>`:''}
    <div style="max-height:55vh;overflow-y:auto">
      ${(rows||[]).length ? rows.map(s=>`
        <div class="row-between py8 border-b">
          <div>
            <div class="fw600">${s.product_name}</div>
            <div class="sub">System:${s.system_qty} → Counted:${s.counted_qty}
              · <span class="${s.diff<0?'text-red':s.diff>0?'text-orange':'text-t3'}">${s.diff>0?'+':''}${s.diff}</span></div>
            <div class="sub" style="font-size:10px">${new Date(s.submitted_at).toLocaleString()} · ${s.submitted_by}</div>

          </div>

              <button class="btn btn-green btn-sm" onclick="approveStocktake(${s.id})">✓</button>
              <button class="btn btn-red-soft btn-sm" onclick="rejectStocktake(${s.id},${s.product_id},${s.system_qty},${s.counted_qty})">✕</button>
            `:''}
          </div>
        </div>`).join('')
      :`<div class="empty">${t('no_data')}</div>`}
    </div>`);
}

async function approveStocktake(id) {
  const row = (await GET('stocktake',`id=eq.${id}`))?.[0];
  if (!row) return;
  try {
    // Adjust stock to match counted
    if (row.diff !== 0) {
      const s = (await GET('stock',`product_id=eq.${row.product_id}`))?.[0];
      if (s) {
        const newQty   = Math.max(0,(s.qty||0)+row.diff);
        const newAvail = Math.max(0,(s.available||0)+row.diff);
        await PATCH('stock',`product_id=eq.${row.product_id}`,{qty:newQty,available:newAvail,updated_at:now()});
      }
    }
    await PATCH('stocktake',`id=eq.${id}`,{status:'approved',approved_by:S.user.id,approved_at:now()});
    toast('Stocktake approved. Stock adjusted ✓','success');
    previewStocktakes(row.container_id);
  } catch(e) { toast(e.message,'error'); }
}

async function rejectStocktake(id, pid, sysQty, cntQty) {
  try {
    await PATCH('stocktake',`id=eq.${id}`,{status:'rejected',approved_by:S.user.id,approved_at:now()});
    toast('Stocktake rejected. Stock unchanged.','info');
    const row = (await GET('stocktake',`id=eq.${id}`))?.[0];
    if (row) previewStocktakes(row.container_id);
  } catch(e) { toast(e.message,'error'); }
}

async function filterUsers(filter) {
  document.querySelectorAll('[id^="ur-"]').forEach(el=>el.classList.remove('factive'));
  $('ur-'+filter)?.classList.add('factive');
  await loadUsers(filter);
}

async function loadUsers(filter) {
  try {
    let q = 'deleted=eq.false';
    if (filter==='pending') q+=`&status=eq.pending`;
    else if (filter!=='all') q+=`&role=eq.${filter}`;
    const users = await GET('users',q,'*');
    users?.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const el=$('users-list');
    if(!users?.length){el.innerHTML=`<div class="empty">${t('no_data')}</div>`;return;}
    el.innerHTML=users.map(u=>userCard(u)).join('');
  } catch(e){html('users-list',`<div class="err">${e.message}</div>`);}
}

function userCard(u) {
  const roleColors = {super:'badge-purple',reviewer:'badge-blue',finance:'badge-green',warehouse:'badge-orange',customer:'badge-gray'};
  return `
  <div class="card mb8 ${u.status==='pending'?'card-warn':''}">
    <div class="row-between">
      <div style="flex:1;min-width:0">
        <div class="row-gap mb4">
          <span class="fw800">${u.name}</span>
          <span class="badge ${roleColors[u.role]||'badge-gray'}">${u.role}</span>
          <span class="badge ${u.status==='active'?'badge-green':u.status==='pending'?'badge-yellow':'badge-red'}">${u.status}</span>
          ${u.disabled?'<span class="badge badge-red">Disabled</span>':''}
        </div>
        <div class="sub">${u.id} · 📱 ${u.phone}</div>
        ${u.district?`<div class="sub">📍 ${u.district}${u.address?', '+u.address:''}</div>`:''}
        ${u.assigned_to?`<div class="sub">👤 Assigned to: ${u.assigned_to}</div>`:''}
        <div class="sub" style="font-size:10px">Joined ${new Date(u.created_at).toLocaleDateString()}</div>
      </div>
      <div class="row-gap" style="flex-direction:column;align-items:flex-end">
        ${u.status==='pending'?`
          <div class="row-gap">
            <button class="btn btn-green btn-sm" onclick="superApproveUser('${u.id}')">✓ Approve</button>
            <button class="btn btn-red-soft btn-sm" onclick="superRejectUser('${u.id}')">✕</button>
          </div>`:
          `<button class="btn btn-dark btn-sm" onclick="openEditUser('${u.id}')">✏️ Edit</button>`}
        <button class="btn btn-dark btn-sm" onclick="toggleDisableUser('${u.id}',${u.disabled})">
          ${u.disabled?'Enable':'Disable'}
        </button>
      </div>
    </div>
  </div>`;
}

async function superApproveUser(uid) {
  try {
    const u = (await GET('users',`id=eq.${uid}`))?.[0];
    if(!u) return;
    const update = {status:'active',approved_by:S.user.id,approved_at:now()};
    // Auto-assign customers if approved by reviewer
    if (u.role==='customer' && S.user.role==='reviewer') update.assigned_to=S.user.id;
    await PATCH('users',`id=eq.${uid}`,update);
    await pushNotif(uid,'',`✅ ${S.lang==='zh'?'账号已激活':'Account approved!'}`,
      u.role==='customer'?'You can now log in and place orders.':'Your staff account is now active.','system');
    toast('User approved ✓','success');
    loadUsers('pending');
  } catch(e){toast(e.message,'error');}
}

async function superRejectUser(uid) {
  const reason = prompt('Rejection reason (optional):')||'';
  try {
    await PATCH('users',`id=eq.${uid}`,{status:'rejected'});
    await pushNotif(uid,'','❌ Registration rejected',reason||'Please contact admin.','system');
    toast('User rejected','info'); loadUsers('pending');
  } catch(e){toast(e.message,'error');}
}

async function toggleDisableUser(uid, isDisabled) {
  if(!confirm(`${isDisabled?'Enable':'Disable'} this user?`)) return;
  try {
    await PATCH('users',`id=eq.${uid}`,{disabled:!isDisabled});
    toast(isDisabled?'User enabled ✓':'User disabled','info');

}

async function saveEditUser(uid, oldRole) {
  const upd = {
    name:   $('eu-name')?.value?.trim(),
    phone:  $('eu-phone')?.value?.trim(),
    role:   $('eu-role')?.value,
    district:$('eu-dist')?.value?.trim()||'',
    address:$('eu-addr')?.value?.trim()||'',
  };
  if (oldRole==='customer') upd.assigned_to = $('eu-sales')?.value||'';
  const newPw = $('eu-pw')?.value?.trim();
  if (newPw) { if(newPw.length<4) return toast('Password min 4 chars','error'); upd.pw=newPw; }
  try {
    await PATCH('users',`id=eq.${uid}`,upd);
    closeModal(); toast('User updated ✓','success'); loadUsers('all');
  } catch(e){toast(e.message,'error');}
}

      ${['overview','presale','sales','customers','containers'].map((tab,i)=>`

async function loadAnalyticsTab(tab) {
  document.querySelectorAll('[id^="an-"]').forEach(el=>el.classList.remove('factive'));
  $('an-'+tab)?.classList.add('factive');
  const el=$('analytics-body');
  el.innerHTML=`<div class="center-spin"><span class="spin-lg"></span></div>`;
  try {
    if (tab==='overview') await analyticsOverview(el);
    else if (tab==='presale') await analyticsPresale(el);
    else if (tab==='sales') await analyticsSales(el);
    else if (tab==='customers') await analyticsCustomers(el);
    else if (tab==='containers') await analyticsContainers(el);
  } catch(e){el.innerHTML=`<div class="err">${e.message}</div>`;}
}

async function analyticsOverview(el) {
  const [orders, users, stock] = await Promise.all([
    GET('orders', 'status=not.in.(cancelled,sales_rejected)', '*'),
    GET('users', 'deleted=eq.false', 'role,status'),
    GET('stock', undefined, 'available,reserved,qty'),
  ]);

  const totalRevenue  = (orders||[]).filter(o=>o.status==='completed').reduce((s,o)=>s+(o.total||0),0);
  const pendingOrders = (orders||[]).filter(o=>['submitted','sales_approved','finance_confirmed','shipped'].includes(o.status)).length;
  const completedOrders = (orders||[]).filter(o=>o.status==='completed').length;
  const activeCustomers = (users||[]).filter(u=>u.role==='customer'&&u.status==='active').length;
  const totalAvail  = (stock||[]).reduce((s,r)=>s+(r.available||0),0);
  const totalReserved = (stock||[]).reduce((s,r)=>s+(r.reserved||0),0);
  const overdueCredit = (orders||[]).filter(o=>
    o.pay_method==='Credit'&&!o.credit_paid&&o.credit_due_date&&new Date(o.credit_due_date)<new Date()).length;

  // Orders by status (last 30 days)
  const cutoff30 = new Date(Date.now()-30*86400000).toISOString();
  const recent30 = (orders||[]).filter(o=>o.submitted_at>=cutoff30);
  const byStatus = {};
  recent30.forEach(o=>{ byStatus[o.status]=(byStatus[o.status]||0)+1; });

  // Revenue last 7 days
  const days7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-6+i); return d.toISOString().slice(0,10);
  });
  const rev7 = days7.map(day=>({
    day: day.slice(5),
    rev: (orders||[]).filter(o=>o.status==='completed'&&(o.completed_at||'').slice(0,10)===day).reduce((s,o)=>s+(o.total||0),0)
  }));

  el.innerHTML=`
    <div class="stat-grid mb14">
      <div class="stat-card">
        <div class="stat-lbl">💰 ${S.lang==='zh'?'已完成收入':'Completed Revenue'}</div>
        <div class="stat-val">${fmtK(totalRevenue)}</div>
        <div class="stat-sub">TZS</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">📋 ${S.lang==='zh'?'进行中订单':'Active Orders'}</div>
        <div class="stat-val">${pendingOrders}</div>
        <div class="stat-sub">${completedOrders} completed total</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">👥 ${S.lang==='zh'?'活跃客户':'Active Customers'}</div>
        <div class="stat-val">${activeCustomers}</div>
        <div class="stat-sub">${(users||[]).filter(u=>u.role==='customer'&&u.status==='pending').length} pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">📦 ${S.lang==='zh'?'可发货库存':'Avail Stock'}</div>
        <div class="stat-val">${totalAvail}</div>
        <div class="stat-sub">${totalReserved} reserved</div>
      </div>
      ${overdueCredit>0?`
      <div class="stat-card stat-warn">
        <div class="stat-lbl">⚠️ ${S.lang==='zh'?'信用逾期':'Credit Overdue'}</div>
        <div class="stat-val text-orange">${overdueCredit}</div>
        <div class="stat-sub">${S.lang==='zh'?'订单逾期未付款':'Orders past due date'}</div>
      </div>`:''}
    </div>

    <!-- Revenue chart 7 days -->
    <div class="card mb12">
      <div class="card-title">📈 ${S.lang==='zh'?'近7天已完成收入':'Revenue — Last 7 Days'}</div>
      <canvas id="rev-chart" height="180"></canvas>
    </div>

    <!-- Order status breakdown 30 days -->
    <div class="card mb12">
      <div class="card-title">📊 ${S.lang==='zh'?'订单状态分布（近30天）':'Order Status — Last 30 Days'}</div>
      <canvas id="status-chart" height="200"></canvas>
    </div>`;

  // Revenue bar chart
  setTimeout(()=>{
    const ctx1 = $('rev-chart');
    if (ctx1) new Chart(ctx1,{
      type:'bar',
      data:{
        labels:rev7.map(d=>d.day),
        datasets:[{label:S.lang==='zh'?'收入 TZS':'Revenue TZS',
          data:rev7.map(d=>d.rev),
          backgroundColor:'rgba(245,158,11,0.7)',borderColor:'#f59e0b',borderWidth:1}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,0.05)'}},
          x:{grid:{display:false}}}}
    });
    const ctx2 = $('status-chart');
    const statusLabels = Object.keys(byStatus);
    const statusData   = Object.values(byStatus);
    const colors = ['#f59e0b','#6366f1','#a855f7','#f97316','#10b981','#ef4444','#6b7280'];
    if (ctx2) new Chart(ctx2,{
      type:'doughnut',
      data:{labels:statusLabels,datasets:[{data:statusData,backgroundColor:colors,borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'rgba(255,255,255,0.7)',boxWidth:12}}}}
    });
  },100);
}

async function analyticsPresale(el) {
  const containers = await GET('containers','status=in.(incoming,active)','id,name,arrival_date');
  if (!containers?.length) { el.innerHTML=`<div class="empty">${S.lang==='zh'?'没有未到货货柜':'No upcoming containers'}</div>`; return; }

  // Aggregate pre-orders per product (orders on incoming containers)
  const cIds = containers.map(c=>c.id);
  const orders = await GET('orders',
    `container_id=in.(${cIds.join(',')})&status=in.(submitted,sales_approved,finance_confirmed)`, '*');
  const items = orders?.length ? await GET('order_items',
    `order_id=in.(${orders.map(o=>o.id).join(',')})`, '*') : [];

  const products = await GET('products',
    `container_id=in.(${cIds.join(',')})`, '*');
  const stock    = await GET('stock',
    `container_id=in.(${cIds.join(',')})`, '*');
  const sm={}; (stock||[]).forEach(s=>sm[s.product_id]=s);
  const pm={}; (products||[]).forEach(p=>pm[p.id]=p);

  // Pre-order qty per product
  const preorderQty={}, preorderVal={};
  (items||[]).forEach(i=>{
    preorderQty[i.product_id]=(preorderQty[i.product_id]||0)+i.qty;
    preorderVal[i.product_id]=(preorderVal[i.product_id]||0)+i.subtotal;
  });

  // Sort by pre-order qty desc
  const sorted = Object.entries(preorderQty).sort((a,b)=>b[1]-a[1]);

  // Sales performance per salesperson
  const salesPerf={};
  (orders||[]).forEach(o=>{
    if(o.assigned_sales){
      salesPerf[o.assigned_sales]=salesPerf[o.assigned_sales]||{orders:0,value:0};
      salesPerf[o.assigned_sales].orders++;
      salesPerf[o.assigned_sales].value+=(o.total||0);
    }
  });

  // Slow movers: available > 0, preorder < threshold
  const slowMovers = (products||[]).filter(p=>{
    const av=(sm[p.id]?.available||0);
    const po=preorderQty[p.id]||0;
    return av>0 && po<2; // less than 2 bales pre-ordered
  });

  el.innerHTML=`
    <div class="card mb12">
      <div class="card-title">🔥 ${S.lang==='zh'?'预售热度排名':'Pre-order Popularity Ranking'}</div>
      ${sorted.length?`
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>${S.lang==='zh'?'商品':'Product'}</th>
            <th class="tr">${S.lang==='zh'?'预订量':'Pre-orders'}</th>
            <th class="tr">${S.lang==='zh'?'预订金额':'Value'}</th>
            <th class="tr">${S.lang==='zh'?'库存':'Stock'}</th>
            <th class="tr">${S.lang==='zh'?'缺口':'Gap'}</th>
          </tr></thead>
          <tbody>
            ${sorted.map(([pid,qty],i)=>{
              const p=pm[pid]||{name:pid,code:''};
              const avail=sm[pid]?.available||0;
              const gap=qty-avail;
              return `<tr>
                <td class="sub">${i+1}</td>
                <td><div class="fw600">${p.name}</div><div class="mono sub">${p.code}</div></td>
                <td class="tr fw700 text-gold">${qty}</td>
                <td class="tr">${fmtK(preorderVal[pid]||0)}</td>
                <td class="tr ${avail>0?'text-green':'text-red'}">${avail}</td>
                <td class="tr ${gap>0?'text-red fw700':''}">${gap>0?'+'+gap:gap}</td>
              </tr>`; }).join('')}
          </tbody>
        </table>
      </div>`:`<div class="empty">${S.lang==='zh'?'暂无预订数据':'No pre-orders yet'}</div>`}
    </div>

    <div class="card mb12">
      <div class="card-title">🐌 ${S.lang==='zh'?'滞销品 (可捆绑推广)':'Slow Movers — Suggest Bundling'}</div>
      ${slowMovers.length?`
      <div class="notice notice-orange mb10">
        ${S.lang==='zh'
          ?'以下商品库存充足但预订量低。建议与热销品捆绑销售，或告知销售人员主动推荐。'
          :'These items have stock but low pre-orders. Consider bundling with hot items or prompting your sales team.'}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${slowMovers.map(p=>`
          <div class="badge badge-orange" style="padding:6px 12px;border-radius:8px">
            ${p.name} · ${sm[p.id]?.available||0} avail · ${preorderQty[p.id]||0} pre-ordered
          </div>`).join('')}
      </div>`:`<div class="sub text-green">✓ All products have sufficient pre-orders</div>`}
    </div>

    <div class="card mb12">
      <div class="card-title">👤 ${S.lang==='zh'?'销售员预售业绩':'Salesperson Pre-sale Performance'}</div>
      ${Object.entries(salesPerf).length?`
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Sales ID</th>
            <th class="tr">${S.lang==='zh'?'订单数':'Orders'}</th>
            <th class="tr">${S.lang==='zh'?'金额':'Value'}</th>
          </tr></thead>
          <tbody>
            ${Object.entries(salesPerf).sort((a,b)=>b[1].value-a[1].value).map(([sid,d])=>`
              <tr>
                <td class="fw700 mono">${sid}</td>
                <td class="tr">${d.orders}</td>
                <td class="tr fw700 text-gold">${fmtK(d.value)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`:`<div class="empty">${t('no_data')}</div>`}
    </div>`;
}

async function analyticsSales(el) {
  const orders = await GET('orders','status=not.in.(cancelled,sales_rejected)','*');
  const completed = (orders||[]).filter(o=>o.status==='completed');

  // By payment method
  const byPay={};
  completed.forEach(o=>{
    const m=o.pay_method_actual||o.pay_method;
    byPay[m]=byPay[m]||{count:0,value:0};
    byPay[m].count++; byPay[m].value+=(o.total||0);
  });

  // Monthly revenue (last 6 months)
  const months=Array.from({length:6},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-5+i);
    return {key:d.toISOString().slice(0,7),label:d.toLocaleDateString(S.lang==='zh'?'zh-CN':'en-GB',{month:'short',year:'2-digit'})};
  });
  const monthlyRev = months.map(m=>({
    label:m.label,
    rev: completed.filter(o=>(o.completed_at||'').slice(0,7)===m.key).reduce((s,o)=>s+(o.total||0),0)
  }));

  // Sales by salesperson (completed)
  const bySales={};
  completed.forEach(o=>{
    if(o.assigned_sales){
      bySales[o.assigned_sales]=bySales[o.assigned_sales]||{orders:0,value:0,customers:new Set()};
      bySales[o.assigned_sales].orders++;
      bySales[o.assigned_sales].value+=(o.total||0);
      bySales[o.assigned_sales].customers.add(o.customer_id);
    }
  });

  // Discount stats
  const discOrders=(orders||[]).filter(o=>o.has_discount);

  el.innerHTML=`
    <div class="stat-grid mb14">
      <div class="stat-card">
        <div class="stat-lbl">✅ ${S.lang==='zh'?'完成订单':'Completed'}</div>
        <div class="stat-val">${completed.length}</div>
        <div class="stat-sub">${fmtK(completed.reduce((s,o)=>s+(o.total||0),0))} TZS total</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">🏷 ${S.lang==='zh'?'折扣订单':'Discount Orders'}</div>
        <div class="stat-val text-orange">${discOrders.length}</div>
        <div class="stat-sub">${(orders?.length?((discOrders.length/orders.length)*100).toFixed(1):0)}% of all orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">💳 ${S.lang==='zh'?'赊账未付':'Credit Unpaid'}</div>
        <div class="stat-val">${(orders||[]).filter(o=>o.pay_method==='Credit'&&!o.credit_paid).length}</div>
        <div class="stat-sub">${fmtK((orders||[]).filter(o=>o.pay_method==='Credit'&&!o.credit_paid).reduce((s,o)=>s+(o.total||0),0))} TZS</div>
      </div>
    </div>

    <div class="card mb12">
      <div class="card-title">📈 ${S.lang==='zh'?'近6月收入趋势':'Revenue — Last 6 Months'}</div>
      <canvas id="monthly-chart" height="200"></canvas>
    </div>

    <div class="card mb12">
      <div class="card-title">💵 ${S.lang==='zh'?'支付方式分布':'Payment Method Breakdown'}</div>
      <canvas id="pay-chart" height="180"></canvas>
    </div>

    <div class="card mb12">
      <div class="card-title">🏆 ${S.lang==='zh'?'销售员业绩排名':'Salesperson Performance'}</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>${S.lang==='zh'?'销售员':'Salesperson'}</th>
            <th class="tr">${S.lang==='zh'?'客户':'Customers'}</th>
            <th class="tr">${S.lang==='zh'?'完成单':'Orders'}</th>
            <th class="tr">${S.lang==='zh'?'业绩':'Revenue'}</th>
          </tr></thead>
          <tbody>
            ${Object.entries(bySales).sort((a,b)=>b[1].value-a[1].value).map(([sid,d])=>`
              <tr>
                <td class="fw800 mono">${sid}</td>
                <td class="tr">${d.customers.size}</td>
                <td class="tr">${d.orders}</td>
                <td class="tr fw700 text-gold">${fmtK(d.value)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  setTimeout(()=>{
    const c1=$('monthly-chart');
    if(c1) new Chart(c1,{type:'line',
      data:{labels:monthlyRev.map(m=>m.label),
        datasets:[{label:'TZS',data:monthlyRev.map(m=>m.rev),
          borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)',
          tension:0.4,fill:true,pointRadius:4}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,0.05)'}},
          x:{grid:{display:false}}}}});

    const c2=$('pay-chart');
    if(c2) new Chart(c2,{type:'bar',
      data:{labels:Object.keys(byPay),
        datasets:[{label:'Orders',data:Object.values(byPay).map(v=>v.count),
          backgroundColor:['rgba(16,185,129,.7)','rgba(99,102,241,.7)','rgba(245,158,11,.7)','rgba(239,68,68,.7)'],
          borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{grid:{color:'rgba(255,255,255,0.05)'}},x:{grid:{display:false}}}}});
  },100);
}

                <td class="sub">${i+1}</td>
                <td class="fw600">${c.name}</td>
                <td class="mono sub">${c.id}</td>
                <td class="sub">${c.district||'—'}</td>
                <td class="tr fw700 text-gold">${fmtK(c.spend)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    ${badAddr.length?`
    <div class="card mb12">
      <div class="card-title">⚠️ ${S.lang==='zh'?'地址待完善的客户':'Customers Missing Address'}</div>
      ${badAddr.map(c=>`
        <div class="row-between py8 border-b">
          <div><div class="fw600">${c.name}</div><div class="sub">${c.phone} · ${c.assigned_to||'Unassigned'}</div></div>
          <span class="badge badge-orange">No address</span>
        </div>`).join('')}
    </div>`:''}`;

  setTimeout(()=>{
    const c=$('dist-chart');
    if(c) new Chart(c,{type:'bar',
      data:{labels:Object.keys(byDist),datasets:[{
        label:S.lang==='zh'?'客户数':'Customers',
        data:Object.values(byDist),
        backgroundColor:'rgba(99,102,241,.7)',borderWidth:0}]},
      options:{indexAxis:'y',responsive:true,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.05)'}},y:{grid:{display:false}}}}});
  },100);
}

async function analyticsContainers(el) {
  const containers = await GET('containers', undefined, '*');
  const orders     = await GET('orders','status=not.in.(cancelled,sales_rejected)','*');
  const stock      = await GET('stock', undefined, '*');

  const sm={}; (stock||[]).forEach(s=>{
    sm[s.container_id]=sm[s.container_id]||{qty:0,available:0,reserved:0};
    sm[s.container_id].qty+=s.qty||0;
    sm[s.container_id].available+=s.available||0;
    sm[s.container_id].reserved+=s.reserved||0;
  });

  const cStats={};
  (orders||[]).forEach(o=>{
    cStats[o.container_id]=cStats[o.container_id]||{orders:0,revenue:0,pending:0};
    cStats[o.container_id].orders++;
    if(o.status==='completed') cStats[o.container_id].revenue+=(o.total||0);
    else cStats[o.container_id].pending++;
  });

  el.innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>${S.lang==='zh'?'货柜':'Container'}</th>
          <th>${S.lang==='zh'?'状态':'Status'}</th>
          <th class="tr">${S.lang==='zh'?'总库存':'Total Stock'}</th>
          <th class="tr">${S.lang==='zh'?'可发货':'Available'}</th>
          <th class="tr">${S.lang==='zh'?'已锁':'Reserved'}</th>
          <th class="tr">${S.lang==='zh'?'已完成单':'Completed'}</th>
          <th class="tr">${S.lang==='zh'?'已完成收入':'Revenue'}</th>
          <th class="tr">${S.lang==='zh'?'进行中':'Active Orders'}</th>
        </tr></thead>
        <tbody>
          ${(containers||[]).map(c=>{
            const st=sm[c.id]||{qty:0,available:0,reserved:0};
            const cs=cStats[c.id]||{orders:0,revenue:0,pending:0};
            return `<tr>
              <td>
                <div class="fw600" style="border-left:3px solid ${c.color||'#f59e0b'};padding-left:8px">${c.name}</div>
                <div class="sub">${c.origin||''}</div>
              </td>
              <td><span class="badge ${c.status==='active'?'badge-green':c.status==='incoming'?'badge-yellow':'badge-gray'}">${c.status}</span></td>
              <td class="tr">${st.qty}</td>
              <td class="tr ${st.available>0?'text-green':'text-red'}">${st.available}</td>
              <td class="tr text-orange">${st.reserved}</td>
              <td class="tr fw700">${cs.orders-cs.pending}</td>
              <td class="tr fw700 text-gold">${fmtK(cs.revenue)}</td>
              <td class="tr">${cs.pending}</td>
            </tr>`; }).join('')}
        </tbody>
      </table>
    </div>`;
}

</script>
