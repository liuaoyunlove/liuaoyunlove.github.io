<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DSM Mitumba Orders · Kariakoo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0c0a1e;--bg2:#13102a;--bg3:#1a1635;
  --card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);
  --gold:#f59e0b;--gold2:#fbbf24;--gold-d:rgba(245,158,11,.15);
  --green:#10b981;--red:#ef4444;--blue:#6366f1;
  --orange:#f97316;--purple:#a855f7;
  --text:#f1f5f9;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.28);
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'DM Sans','Noto Sans SC',system-ui,sans-serif;font-size:14px}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}

/* ── LAYOUT ─────────────────────────────────────────── */
#auth-screen{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:linear-gradient(160deg,#0c0a1e,#180800,#0c0a1e);
  padding:16px;overflow-y:auto;z-index:900}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden;display:none}
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--bdr);
  flex-shrink:0;min-height:50px;gap:10px}
#main{flex:1;overflow:hidden;display:flex}
#sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--bdr);
  overflow-y:auto;flex-shrink:0;padding:6px 0;display:flex;flex-direction:column}
#content{flex:1;overflow-y:auto;padding:14px}
#bottom-nav{display:none;background:var(--bg2);border-top:1px solid var(--bdr);flex-shrink:0}

/* ── AUTH ───────────────────────────────────────────── */
.auth-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:26px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:20px}
.logo-box{width:68px;height:68px;border-radius:16px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-weight:900;font-size:13px;color:#000;
  box-shadow:0 8px 24px rgba(245,158,11,.35)}
.auth-title{font-size:20px;font-weight:900;text-align:center;margin-bottom:3px}
.auth-sub{font-size:11px;color:var(--t3);text-align:center}
.auth-links{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:14px}
.auth-links a{color:var(--gold);font-size:13px;cursor:pointer;text-decoration:none}

/* ── SIDEBAR ────────────────────────────────────────── */
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;
  transition:all .15s;position:relative}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--gold-d);color:var(--gold);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-lbl{flex:1}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:99px;min-width:17px;text-align:center}

/* ── BOTTOM NAV ─────────────────────────────────────── */
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 4px 9px;cursor:pointer;color:var(--t3);
  font-size:10px;font-weight:600;gap:2px;transition:color .15s}
.bnav.active{color:var(--gold)}
.bicon{font-size:20px;line-height:1}

/* ── TOPBAR ─────────────────────────────────────────── */
.brand{display:flex;align-items:center;gap:8px}
.brand-box{width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:9px;color:#000;flex-shrink:0}
.brand-name{font-weight:800;font-size:14px}
.brand-sub{font-size:9px;color:var(--t3)}
#topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--t3)}
.lang-btn.active{background:var(--gold-d);color:var(--gold);border-color:var(--gold)}
#notif-bell{position:relative;width:32px;height:32px;border-radius:var(--rs);
  background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px}
#notif-dot{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:1px 4px;border-radius:99px;
  min-width:15px;text-align:center;display:none}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-d);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--gold);font-size:12px;cursor:pointer;flex-shrink:0}

/* ── FORMS ──────────────────────────────────────────── */
.form-g{margin-bottom:12px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.inp{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);border-radius:var(--rs);color:var(--text);
  font-size:14px;transition:border .15s}
.inp:focus{border-color:var(--gold);background:rgba(245,158,11,.04)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:#1a1635}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 15px;border-radius:var(--rs);font-size:13px;font-weight:700;
  transition:all .15s;cursor:pointer}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}
.btn-gold:hover{box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-dark{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--bdr)}
.btn-dark:hover{background:rgba(255,255,255,.12)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-red{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.btn-orange{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.btn-red-soft{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-lg{padding:14px;font-size:15px}
.w100{width:100%}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.mb0{margin-bottom:0}
.pay-btn{justify-content:center}

/* ── CARDS ──────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px}
.card-disc{border-color:var(--orange)}
.card-warn{border-color:var(--gold)}
.card-overdue{border-color:var(--red);animation:pulse-red 2s infinite}
.card-container{margin-bottom:12px;cursor:default}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.card-title{font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

/* ── STAT CARDS ─────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.stat-warn{border-color:var(--orange)}
.stat-lbl{font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:900}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* ── BADGES ─────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;
  border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-green{background:rgba(16,185,129,.15);color:#34d399}
.badge-blue{background:rgba(99,102,241,.15);color:#a5b4fc}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}
.badge-orange{background:rgba(249,115,22,.15);color:#fb923c}
.badge-purple{background:rgba(168,85,247,.15);color:#c084fc}
.badge-gray{background:rgba(255,255,255,.07);color:var(--t2)}
.badge-discount{background:linear-gradient(90deg,rgba(249,115,22,.2),rgba(239,68,68,.2));
  color:#fb923c;border:1px solid rgba(249,115,22,.3)}

/* ── FLOW BAR ───────────────────────────────────────── */
.flow-bar{display:flex;align-items:flex-start;overflow-x:auto;padding:8px 0;gap:0}
.flow-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.flow-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;border:2px solid var(--bdr);
  background:var(--bg3);color:var(--t3)}
.flow-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.flow-dot.active{background:var(--gold);border-color:var(--gold);color:#000}
.flow-lbl{font-size:9px;color:var(--t3);margin-top:3px;white-space:nowrap}
.flow-arr{color:var(--t3);font-size:12px;margin:0 3px;padding-bottom:14px;flex-shrink:0}

/* ── PRODUCT LIST ───────────────────────────────────── */
.prod-list{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.prod-row{display:grid;grid-template-columns:1fr 65px 55px 110px;gap:4px;
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.prod-row.has-qty{background:rgba(245,158,11,.05)}
.prod-row.has-disc{background:rgba(249,115,22,.06)}
.prod-name{font-size:13px;font-weight:600;line-height:1.3}
.prod-code{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.prod-avail{font-size:10px;font-weight:700;margin-top:2px}
.avail-ok{color:var(--green)}.avail-no{color:var(--red)}
.prod-price{text-align:right;font-size:13px;font-weight:700;color:var(--t2)}
.price-orig{text-decoration:line-through;color:var(--t3);font-size:11px}
.price-disc{color:var(--orange);font-size:13px;font-weight:800}
.disc-wrap{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.disc-inp{width:46px;height:28px;text-align:center;background:rgba(249,115,22,.1);
  border:1px solid rgba(249,115,22,.3);border-radius:6px;color:var(--orange);
  font-size:12px;font-weight:700;-moz-appearance:textfield}
.disc-inp::-webkit-inner-spin-button{display:none}
.disc-k{font-size:10px;color:var(--t3)}
.qty-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.stepper{display:flex;align-items:center;gap:3px}
.step-btn{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;cursor:pointer;border:none}
.step-btn:active{transform:scale(.85)}
.step-btn.minus{background:rgba(255,255,255,.08);color:var(--t2)}
.step-btn.plus{background:var(--gold);color:#000}
.step-inp{width:36px;height:26px;text-align:center;background:rgba(255,255,255,.06);
  border:1px solid var(--bdr);border-radius:6px;color:var(--text);
  font-size:12px;font-weight:700;-moz-appearance:textfield}
.step-inp::-webkit-inner-spin-button{display:none}
.row-sub{font-size:11px;font-weight:800;color:var(--gold)}

/* ── SUBTOTAL BAR ───────────────────────────────────── */
.subtotal-bar{position:sticky;top:0;z-index:10;background:var(--bg2);
  border:1px solid var(--bdr);border-radius:var(--r);
  padding:9px 12px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-meta{font-size:12px;font-weight:700;color:var(--t2)}
.sb-label{font-size:10px;color:var(--t3)}
.sb-total{font-size:22px;font-weight:900;color:var(--gold)}

/* ── NOTICES ────────────────────────────────────────── */
.notice{padding:9px 12px;border-radius:var(--rs);font-size:12px;line-height:1.5}
.notice-gold{background:var(--gold-d);border:1px solid rgba(245,158,11,.3);color:var(--gold)}
.notice-orange{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:#fb923c}
.notice-blue{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.notice-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.notice-inline{display:inline-block;font-size:11px;color:var(--t2);font-style:italic}
.disc-banner{background:linear-gradient(90deg,#c2410c,#ea580c);
  padding:7px 12px;border-radius:var(--rs) var(--rs) 0 0;
  font-size:12px;font-weight:700;color:#fff;margin:-14px -14px 10px -14px}

/* ── ORDER CARD HELPERS ─────────────────────────────── */
.order-id{font-family:monospace;font-size:13px;font-weight:800}
.order-amt{text-align:right;flex-shrink:0}
.amt-big{font-size:20px;font-weight:900}
.amt-orig{font-size:11px;text-decoration:line-through;color:var(--t3)}

/* ── MODAL ──────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.overlay.center{align-items:center}
.modal{background:var(--bg2);border:1px solid var(--bdr);
  border-radius:var(--r) var(--r) 0 0;width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;padding:18px 14px;
  box-shadow:0 -10px 40px rgba(0,0,0,.5)}
.overlay.center .modal{border-radius:var(--r);max-width:480px}
.modal-title{font-size:15px;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between}
.modal-x{font-size:20px;color:var(--t3);cursor:pointer;line-height:1;padding:4px}
.modal-x:hover{color:var(--text)}

/* ── TABLE ──────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.tl{text-align:left}.tr{text-align:right}
.disc-th{color:var(--orange)}
.disc-row{background:rgba(249,115,22,.05)}
.totals-row{display:flex;justify-content:flex-end;align-items:center;gap:20px;
  padding-top:10px;border-top:1px solid var(--bdr)}
.total-final{font-size:20px;font-weight:900;color:var(--gold)}

/* ── PAY GRID ───────────────────────────────────────── */
.pay-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

/* ── TOAST ──────────────────────────────────────────── */
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);
  background:#1e293b;border:1px solid var(--bdr);border-radius:99px;
  padding:9px 18px;font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.toast.success{border-color:var(--green);color:#34d399}
.toast.error{border-color:var(--red);color:#f87171}
.toast.info{border-color:var(--gold);color:var(--gold)}

/* ── SPINNER ────────────────────────────────────────── */
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spin-lg{width:32px;height:32px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.center-spin{display:flex;align-items:center;justify-content:center;padding:50px}

/* ── MISC HELPERS ───────────────────────────────────── */
.row-between{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.row-gap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:900;margin-bottom:14px}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn.factive{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--t3);padding:44px 0;font-size:13px}
.err{color:var(--red);padding:20px;font-size:13px}
.fw600{font-weight:600}.fw700{font-weight:700}.fw800{font-weight:800}.fw900{font-weight:900}
.fs16{font-size:16px}
.sub{font-size:12px;color:var(--t2);margin-top:2px}
.mono{font-family:monospace;font-size:12px}
.text-gold{color:var(--gold)}.text-green{color:var(--green)}.text-red{color:var(--red)}
.text-orange{color:var(--orange)}.text-t3{color:var(--t3)}
.py6{padding-top:6px;padding-bottom:6px}
.py8{padding-top:8px;padding-bottom:8px}
.border-b{border-bottom:1px solid var(--bdr)}
.avatar-lg{width:52px;height:52px;border-radius:50%;background:var(--gold-d);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:var(--gold);flex-shrink:0}
.notif-item{padding:10px;border-bottom:1px solid var(--bdr);cursor:pointer}
.notif-item:hover{background:var(--card)}
.notif-unread{border-left:3px solid var(--gold);padding-left:8px}
.cname{font-size:15px;font-weight:800;margin-bottom:3px}
.csub{font-size:12px;color:var(--t2);margin-top:2px}
.stock-badge{text-align:right;flex-shrink:0}
.stock-num{font-size:28px;font-weight:900}
.stock-lbl{font-size:10px;color:var(--t3)}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:768px){
  #sidebar{display:none}
  #bottom-nav{display:flex}
  #content{padding:10px 9px}
  .form-row{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .prod-row{grid-template-columns:1fr 58px 100px}
  .prod-row .disc-wrap{display:none}
}
@media(min-width:769px){
  #bottom-nav{display:none!important}
}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════════════ -->
<div id="auth-screen">
  <div id="auth-wrap"></div>
</div>

<!-- ══ APP ══════════════════════════════════════════════════ -->
<div id="app">
  <!-- Topbar -->
  <div id="topbar">
    <div class="brand">
      <div class="brand-box">DSM</div>
      <div>
        <div class="brand-name">DSM Mitumba</div>
        <div class="brand-sub">Kigogo St · Kariakoo 🇹🇿</div>
      </div>
    </div>
    <div id="topbar-right">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中文</button>
      <div id="notif-bell" onclick="showNotifications()">🔔
        <span id="notif-dot"></span>
      </div>
      <div class="avatar" id="avatar" onclick="nav('profile')">?</div>
      <div style="font-size:10px;color:var(--t3);display:none" id="user-id"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="sidebar"><div id="sidebar-nav"></div></div>
    <div id="content"></div>
  </div>

  <!-- Mobile bottom nav -->
  <div id="bottom-nav" style="width:100%"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

// ═══ SUPABASE HELPERS ═══════════════════════════════════════
async function sbFetch(method, path, body, params) {
  let url = `${SB_URL}/rest/v1/${path}`;
  if (params) url += '?' + params;
  const h = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : '',
  };
  const r = await fetch(url, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  if (r.status === 204) return null;
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || d.hint || d.error || `HTTP ${r.status}`);
  return d;
}
const GET    = (t,p,s) => sbFetch('GET',    t, null,   (p?p+'&':'')+'select='+(s||'*'));
const POST   = (t,d)   => sbFetch('POST',   t, d);
const PATCH  = (t,p,d) => sbFetch('PATCH',  t, d,      p);
const DELETE = (t,p)   => sbFetch('DELETE', t, null,   p);

function toast(msg, type='info', ms=3000) {

}

function modal(content, opts={}) {
  document.querySelector('.overlay')?.remove();
  const o = document.createElement('div');
  o.className = 'overlay' + (opts.center ? ' center' : '');
  o.innerHTML = `<div class="modal">${content}</div>`;
  if (!opts.persist) o.onclick = e => { if (e.target === o) o.remove(); };
  document.body.appendChild(o);
  return o;
}
const closeModal = () => document.querySelector('.overlay')?.remove();

function flowBar(status) {
  const steps = [
    { en:'Submitted',  zh:'提交' },
    { en:'Sales ✓',    zh:'销售批' },
    { en:'Paid',       zh:'收款' },
    { en:'Shipped',    zh:'发货' },
    { en:'Done',       zh:'完成' },
  ];
  const cur = SC[status]?.step || 0;
  return '<div class="flow-bar">' + steps.map((s,i) => {
    const n = i+1, done = cur>n, active = cur===n;
    return `<div class="flow-step">
      <div class="flow-dot ${done?'done':active?'active':''}">${done?'✓':n}</div>
      <div class="flow-lbl">${S.lang==='zh'?s.zh:s.en}</div>
    </div>${i<4?'<div class="flow-arr">›</div>':''}`;
  }).join('') + '</div>';
}

async function sendRegCode() {
  const phone = $('r-phone')?.value?.trim();
  if (!phone) return toast('Enter phone first', 'error');
  $('send-code-lnk').textContent = 'Sending...';
  try {
    await fetch(`${GAS_URL}?action=sendCode&phone=${phone}`);
    toast('Verification code sent to admin email ✓', 'success');
    $('send-code-lnk').textContent = 'Resend →';
  } catch { toast('Failed to send', 'error'); $('send-code-lnk').textContent = '→ Send to admin'; }
}

async function sendStaffCode() {
  const phone = $('s-phone')?.value?.trim();
  if (!phone) return toast('Enter phone first', 'error');
  try {
    await fetch(`${GAS_URL}?action=sendCode&phone=${phone}`);
    toast('Code sent ✓', 'success');
  } catch { toast('Failed to send', 'error'); }
}

async function doLogin() {
  const phone = $('l-phone')?.value?.trim();
  const pw    = $('l-pw')?.value?.trim();
  if (!phone || !pw) return toast('Enter phone and password', 'error');
  const btn = $('btn-login');
  btn.innerHTML = '<span class="spin"></span>';
  btn.disabled = true;
  try {
    const rows = await GET('users', `phone=eq.${phone}&deleted=eq.false`);
    if (!rows?.length) throw new Error('Phone not registered');
    const u = rows[0];
    if (u.pw !== pw) throw new Error('Incorrect password');
    if (u.disabled) throw new Error('Account disabled. Contact admin.');
    if (u.status === 'pending') throw new Error('Account pending approval. Please wait.');
    if (u.status === 'rejected') throw new Error('Account registration rejected.');
    await PATCH('users', `id=eq.${u.id}`, { last_login: now() });
    S.user = u;
    $('auth-screen').style.display = 'none';
    $('app').style.display = 'flex';
    initApp();
  } catch(e) {
    toast(e.message, 'error', 4000);
  } finally {
    btn.innerHTML = `${t('login')} · Ingia →`;
    btn.disabled = false;
  }
}

async function doRegister() {
  const name     = $('r-name')?.value?.trim();
  const phone    = $('r-phone')?.value?.trim();
  const pw       = $('r-pw')?.value?.trim();
  const district = $('r-district')?.value;
  const address  = $('r-address')?.value?.trim();
  const code     = $('r-code')?.value?.trim();
  if (!name||!phone||!pw||!district||!code) return toast('Fill all required fields (*)', 'error');
  if (pw.length < 4) return toast('Password min 4 characters', 'error');
  // Verify code via GAS
  try {
    const vr = await fetch(`${GAS_URL}?action=verifyCode&phone=${phone}&code=${code}`).then(r=>r.json()).catch(()=>({ok:false}));
    if (!vr.ok) throw new Error(vr.error || 'Invalid or expired code');
    const exists = await GET('users', `phone=eq.${phone}`, 'id');
    if (exists?.length) throw new Error('Phone already registered');
    const id = await nextUserId('customer');
    await POST('users', { id, phone, name, pw, role:'customer', status:'pending', disabled:false, deleted:false, district, address: address||'', assigned_to:'', created_at:now() });
    // Notify all sales
    await pushNotif(null, 'reviewer', '🆕 New customer registration', `${name} · ${phone} · ${district}`, 'system');
    toast('Account created! A salesperson will approve you soon.', 'success', 5000);
    showLogin();
  } catch(e) { toast(e.message, 'error', 4000); }
}

async function doStaffReg() {
  const name  = $('s-name')?.value?.trim();
  const phone = $('s-phone')?.value?.trim();
  const role  = $('s-role')?.value;
  const pw    = $('s-pw')?.value?.trim();
  const code  = $('s-code')?.value?.trim();
  if (!name||!phone||!pw||!code) return toast('Fill all fields', 'error');
  if (pw.length < 4) return toast('Password min 4 characters', 'error');
  try {
    const vr = await fetch(`${GAS_URL}?action=verifyCode&phone=${phone}&code=${code}`).then(r=>r.json()).catch(()=>({ok:false}));
    if (!vr.ok) throw new Error(vr.error || 'Invalid code');
    const exists = await GET('users', `phone=eq.${phone}`, 'id');
    if (exists?.length) throw new Error('Phone already registered');
    const id = await nextUserId(role);
    await POST('users', { id, phone, name, pw, role, status:'pending', disabled:false, deleted:false, created_at:now() });
    await pushNotif(null, 'super', '🆕 Staff registration pending', `${name} · ${role} · ${phone}`, 'system');
    toast('Submitted! Super admin will review and activate your account.', 'success', 5000);
    showLogin();
  } catch(e) { toast(e.message, 'error', 4000); }
}

    const containers = await GET('containers', 'status=eq.active', '*');

    const sm = {};
    (stockRows||[]).forEach(s => {

      sm[s.container_id].a += s.available||0;
      sm[s.container_id].r += s.reserved||0;

      const st = sm[c.id] || {a:0,r:0};

            </div>
            <div class="cname">${c.name}</div>
            <div class="csub">📅 ${S.lang==='zh'?'预计到货':'Arrival'}: ${arr}</div>
            ${c.note?`<div class="csub">📝 ${c.note}</div>`:''}
          </div>
          <div class="stock-badge">
            <div class="stock-num" style="color:${c.color||'#f59e0b'}">${st.a}</div>
            <div class="stock-lbl">${S.lang==='zh'?'可发货':'available'}</div>

  S.cartContainerId = containerId;
  S.editOrderId = editOrderId;
  if (!editOrderId) { S.cart = {}; S.discounts = {}; }

  html('content', `<div id="order-form"><div class="center-spin"><span class="spin-lg"></span></div></div>`);
  try {
    const [cRows, products] = await Promise.all([
      GET('containers', `id=eq.${containerId}`),
      GET('products', `container_id=eq.${containerId}`, '*'),
    ]);
    const container = cRows?.[0];
    if (!container) throw new Error('Container not found');
    products?.sort((a,b) => a.sort_order - b.sort_order);

    // Stock map
    const pFilter = products?.map(p=>`product_id.eq.${p.id}`).join(',');
    const stockRows = pFilter ? await GET('stock', `or=(${pFilter})`) : [];
    const sm = {};
    (stockRows||[]).forEach(s => sm[s.product_id] = s);

    // Pre-fill cart if editing
    if (editOrderId) {
      const items = await GET('order_items', `order_id=eq.${editOrderId}`);
      (items||[]).forEach(i => {
        const p = products?.find(p => p.code === i.product_code);
        if (p) {
          S.cart[p.id] = i.qty;
          if (i.discount_amt > 0) S.discounts[p.id] = Math.round(i.discount_amt/1000);
        }
      });
    }

    S._products = products || [];
    S._container = container;
    S._stockMap = sm;
    renderOrderForm();
  } catch(e) {
    html('order-form', `<div class="err">${e.message}</div>`);
  }
}

function calcCart() {
  let bales=0, sub=0, disc=0;
  S._products.forEach(p => {
    const q = S.cart[p.id]||0;
    if (!q) return;
    const d = (S.discounts[p.id]||0)*1000;
    const fp = Math.max(0, p.unit_price - d);
    bales += q; sub += q*fp; disc += d*q;
  });
  return { bales, sub:r1k(sub), disc:r1k(disc) };
}

function renderProductRow(p, isReviewer) {
  const s   = S._stockMap[p.id] || {available:0};
  const q   = S.cart[p.id] || 0;
  const d   = S.discounts[p.id] || 0;
  const fp  = Math.max(0, p.unit_price - d*1000);
  const sub = r1k(fp*q);
  const avail = s.available || 0;
  const hasQ = q > 0, hasD = d > 0;

  return `
  <div class="prod-row ${hasQ?'has-qty':''} ${hasD?'has-disc':''}" id="pr-${p.id}">
    <div class="prod-info">
      <div class="prod-name">${p.name}</div>
      <div class="prod-code">${p.code}</div>
      <div class="prod-avail ${avail>0?'avail-ok':'avail-no'}">
        ${t('available')}: ${avail}
      </div>
    </div>
    <div class="prod-price">
      ${hasD
        ? `<div class="price-orig">${Math.round(p.unit_price/1000)}K</div>
           <div class="price-disc">${Math.round(fp/1000)}K</div>`
        : `<div>${Math.round(p.unit_price/1000)}K</div>`}
    </div>
    ${isReviewer ? `
    <div class="disc-wrap">
      <input class="disc-inp" type="number" min="0" placeholder="0"
        title="Discount per bale (K)" value="${d||''}"
        onchange="setDisc('${p.id}',this.value,${p.unit_price})">
      <span class="disc-k">K</span>
    </div>` : `<div></div>`}
    <div class="qty-wrap">
      <div class="stepper">
        <button class="step-btn minus" onclick="setQty('${p.id}',${q-1},${avail})">−</button>
        <input class="step-inp" type="number" min="0" max="${avail}"
          value="${q||''}" placeholder="0"
          onchange="setQty('${p.id}',parseInt(this.value)||0,${avail})">
        <button class="step-btn plus" onclick="setQty('${p.id}',${q+1},${avail})">+</button>
      </div>
      ${hasQ ? `<div class="row-sub">${fmtK(sub)}</div>` : ''}
    </div>
  </div>`;
}

function setQty(pid, qty, max) {
  qty = Math.max(0, Math.min(isNaN(qty)?0:qty, max));
  S.cart[pid] = qty;
  renderOrderForm();
}

function setDisc(pid, val, unitPrice) {
  const d = Math.max(0, parseFloat(val)||0);
  if (d===0) delete S.discounts[pid];
  else S.discounts[pid] = d;
  renderOrderForm();
}

let _discModeOn = false;
function toggleDiscMode() {
  _discModeOn = !_discModeOn;
  const btn = $('disc-mode-btn');
  if (btn) {
    btn.style.background = _discModeOn ? 'var(--orange)' : 'rgba(249,115,22,.15)';
    btn.style.color = _discModeOn ? '#000' : 'var(--orange)';
  }
}

window._selPay = '';
function pickPay(m) {
  window._selPay = m;
  document.querySelectorAll('.pay-btn').forEach(el => el.style.borderColor = '');
  const el = $('pay-'+m.replace(/ /g,''));
  if (el) el.style.cssText += ';border:2px solid var(--gold);color:var(--gold)';
  $('credit-wrap').style.display = m==='Credit' ? 'block' : 'none';
}

async function doSubmitOrder() {
  if (!window._selPay) return toast(S.lang==='zh'?'请选择支付方式':'Select payment method', 'error');
  const items = [];
  let bales=0, sub=0, disc=0, hasDisc=false;

  S._products.forEach(p => {
    const q = S.cart[p.id]||0;
    if (!q) return;
    const d   = (S.discounts[p.id]||0)*1000;
    const fp  = Math.max(0, p.unit_price - d);
    const s   = r1k(fp*q);
    bales += q; sub += s; disc += d*q;
    if (d>0) hasDisc = true;
    items.push({ product_id:p.id, product_code:p.code, product_name:p.name, unit_price:p.unit_price, discount_amt:d, final_price:fp, qty:q, subtotal:s });
  });

  if (!items.length) return toast(S.lang==='zh'?'请选择商品':'Select at least one item', 'error');
  sub = r1k(sub); disc = r1k(disc);

  // Discount confirm dialog
  if (hasDisc) {
    const ok = await confirmDialog(
      `🏷 ${S.lang==='zh'?'确认折扣订单':'Confirm Discount Order'}`,
      `<div class="notice notice-orange">
        <strong>${S.lang==='zh'?'此订单含折扣价格！':'This order contains discounted prices!'}</strong><br>
        ${S.lang==='zh'?'折扣合计':'Total discount'}: <strong>${fmtK(disc)} TZS</strong><br>
        ${S.lang==='zh'?'最终金额':'Final total'}: <strong>${fmtK(sub)} TZS</strong><br>
        <br>${S.lang==='zh'?'财务人员也会看到折扣提示。':'Finance will also see the discount warning.'}
      </div>`
    );
    if (!ok) return;
  }

  const btn = $('submit-btn');
  btn.innerHTML = '<span class="spin"></span> Submitting...';
  btn.disabled = true;

  try {
    const u = S.user;
    const sales = u.role==='reviewer' ? u.id : (u.assigned_to || '');

    if (S.editOrderId) {
      await PATCH('orders', `id=eq.${S.editOrderId}`, {
        pay_method:window._selPay, subtotal:sub, discount_total:disc,
        total:sub, has_discount:hasDisc, note:$('order-note')?.value||''
      });
      await DELETE('order_items', `order_id=eq.${S.editOrderId}`);
      for (const i of items) await POST('order_items', {...i, order_id:S.editOrderId});
      toast('Order updated!', 'success');
    } else {
      const oid = await nextOrderId();
      const creditDue = window._selPay==='Credit' ? $('credit-due')?.value||null : null;
      await POST('orders', {
        id:oid, container_id:S._container.id, container_name:S._container.name,
        customer_id:u.id, customer_name:u.name, customer_phone:u.phone,
        assigned_sales:sales, status:'submitted', pay_method:window._selPay,
        pay_method_actual:'', subtotal:sub, discount_total:disc, total:sub,
        has_discount:hasDisc, credit_due_date:creditDue||null,
        credit_paid:false, note:$('order-note')?.value||'',
        submitted_at:now()
      });
      for (const i of items) await POST('order_items', {...i, order_id:oid});
      await pushNotif(sales, 'reviewer',
        `🆕 ${S.lang==='zh'?'新订单':'New order'} ${oid}`,
        `${u.name} · ${fmtK(sub)} TZS${hasDisc?' 🏷 DISCOUNT':''}`,
        'order', oid);
      toast(`✓ Order ${oid} submitted!`, 'success', 4000);
    }
    S.cart={}; S.discounts={}; S.editOrderId=null; window._selPay='';
    nav('orders');
  } catch(e) {
    toast(e.message, 'error', 4000);
    btn.innerHTML = `📋 ${S.lang==='zh'?'确认并提交':'Review & Submit →'}`;
    btn.disabled = false;
  }
}

}

async function filterMyOrders(status) {
  document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('factive'));
  $('of-'+status)?.classList.add('factive');
  await loadMyOrders(status);
}

async function loadMyOrders(status) {
  const u = S.user;
  try {
    let filter = `customer_id=eq.${u.id}`;
    if (status !== 'all') filter += `&status=eq.${status}`;
    // 3-month rule for completed orders
    if (status === 'all' || status === 'completed') {
      const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-3);
      filter += `&or=(status.neq.completed,completed_at.gte.${cutoff.toISOString()})`;
    }
    const orders = await GET('orders', filter, '*');
    orders?.sort((a,b) => new Date(b.submitted_at) - new Date(a.submitted_at));
    const el = $('orders-list');
    if (!orders?.length) { el.innerHTML = `<div class="empty">${t('no_data')}</div>`; return; }
    el.innerHTML = orders.map(o => orderCard(o, 'customer')).join('');
  } catch(e) { html('orders-list', `<div class="err">${e.message}</div>`); }
}

function orderCard(o, role) {
  const canEdit   = o.status==='submitted' && role==='customer';
  const canCancel = o.status==='submitted' && (role==='customer'||role==='super');
  const isDisc    = o.has_discount;
  const credit_overdue = o.pay_method==='Credit' && !o.credit_paid &&
    o.credit_due_date && new Date(o.credit_due_date) < new Date();

  return `
  <div class="card ${credit_overdue?'card-overdue':''}" style="${isDisc?'border-color:var(--orange)':''}">
    ${isDisc ? `<div class="disc-banner">🏷 DISCOUNT ORDER · -${fmtK(r1k(o.discount_total||0))} TZS · Finance: verify carefully!</div>` : ''}
    <div class="row-between mb8">
      <div style="flex:1;min-width:0">
        <div class="row-gap mb4">
          <span class="order-id">${o.id}</span>
          ${badge(o.status)}
          ${isDisc ? '<span class="badge badge-discount">🏷 Disc</span>' : ''}
          ${credit_overdue ? '<span class="badge badge-red">⚠️ Credit Overdue</span>' : ''}
        </div>
        <div class="sub">${o.container_name||''}</div>
        <div class="sub">${
          o.pay_method==='Cash'?'💵':o.pay_method==='M-Pesa'?'📱':o.pay_method==='Bank Transfer'?'🏦':'💳'
        } ${o.pay_method_actual||o.pay_method}${
          o.pay_method_actual&&o.pay_method_actual!==o.pay_method
            ? ` <span style="color:var(--t3);font-size:10px">(orig:${o.pay_method})</span>` : ''
        } · ${new Date(o.submitted_at).toLocaleDateString()}</div>
        ${o.credit_due_date ? `<div class="sub ${credit_overdue?'text-red':''}">📅 Due: ${new Date(o.credit_due_date).toLocaleDateString()}</div>` : ''}
      </div>
      <div class="order-amt">
        <div class="amt-big ${isDisc?'text-orange':''}">${fmtK(o.total||0)}</div>
        ${o.discount_total>0 ? `<div class="amt-orig">${fmtK(o.subtotal||0)}</div>` : ''}
        <div class="sub">TZS</div>
      </div>
    </div>
    ${flowBar(o.status)}
    ${o.reject_reason ? `<div class="notice notice-red mt8">❌ ${S.lang==='zh'?'拒绝原因':'Reason'}: ${o.reject_reason}</div>` : ''}
    <div class="row-gap mt10">
      <button class="btn btn-dark btn-sm" onclick="showOrderDetail('${o.id}')">▼ ${t('details')}</button>
      ${canEdit   ? `<button class="btn btn-sm" style="background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)" onclick="editOrder('${o.id}','${o.container_id}')">✏️ Edit</button>` : ''}
      ${canCancel ? `<button class="btn btn-sm btn-red-soft" onclick="doCancelOrder('${o.id}')">✕ ${t('cancel')}</button>` : ''}
      ${role==='super' && ['completed','shipped'].includes(o.status) ? `<button class="btn btn-dark btn-sm" onclick="superUndoCancel('${o.id}')">↩ Undo</button>` : ''}
    </div>
  </div>`;
}

      GET('orders', `id=eq.${oid}`),
      GET('order_items', `order_id=eq.${oid}`)
    ]);

    items?.sort((a,b) => a.id-b.id);
    modal(`
      <div class="modal-title">📋 ${o.id}
        <span class="modal-x" onclick="closeModal()">×</span>
      </div>
      ${flowBar(o.status)}
      <div class="table-wrap mt10">
        <table>
          <thead><tr>
            <th>Item</th><th>Code</th>
            <th class="tr">Unit K</th>
            ${o.has_discount ? '<th class="tr disc-th">Disc K</th><th class="tr disc-th">Final K</th>' : ''}
            <th class="tr">Qty</th>
            <th class="tr">Sub</th>
          </tr></thead>
          <tbody>
            ${(items||[]).map(i => `
              <tr ${o.has_discount&&i.discount_amt>0?'class="disc-row"':''}>
                <td>${i.product_name}</td>
                <td class="mono">${i.product_code}</td>

                  <td class="tr ${i.discount_amt>0?'text-orange':''}">${i.discount_amt>0?Math.round(i.discount_amt/1000)+'K':'—'}</td>
                  <td class="tr ${i.discount_amt>0?'text-orange':''}">${Math.round(i.final_price/1000)}K</td>` : ''}
                <td class="tr fw700">${i.qty}</td>
                <td class="tr fw700 text-gold">${fmtK(i.subtotal)}</td>

          </tbody>
        </table>
      </div>
      <div class="totals-row mt10">
        ${o.has_discount ? `<div class="text-orange">🏷 ${S.lang==='zh'?'折扣':'Discount'}: -${fmtK(r1k(o.discount_total))} TZS</div>` : ''}
        <div class="total-final">${fmtK(o.total)} TZS</div>
      </div>`);
  } catch(e) { toast(e.message,'error'); }
}

    <div class="form-g"><label class="lbl">Street Address</label>
      <input class="inp" id="ua-addr" value="${u.address||''}" placeholder="Street name & number"></div>
    <button class="btn btn-gold w100" onclick="doUpdateAddress()">Save</button>`,true);
}

async function doUpdateAddress() {
  const dist = $('ua-dist')?.value;
  const addr = $('ua-addr')?.value?.trim();
  if (!dist) return toast('Select district','error');
  try {
    await PATCH('users',`id=eq.${S.user.id}`,{district:dist,address:addr||''});
    S.user.district = dist; S.user.address = addr||'';
    closeModal(); toast('Address updated ✓','success');
    nav('profile');
  } catch(e) { toast(e.message,'error'); }
}

function doLogout() {
  S.user=null; S.cart={}; S.discounts={};
  $('app').style.display='none';
  $('auth-screen').style.display='flex';
  showLogin();
}

// ═══ NOTIFICATIONS ═══════════════════════════════════════════
async function pushNotif(userId, role, title, body, type='order', orderId='') {
  try {
    await POST('notifications', {
      to_user_id: userId||null, to_role: role||null,
      title, body, type, read:false,
      order_id: orderId||null, created_at:now()
    });
  } catch{}
}

async function showNotifications() {
  try {
    const rows = await GET('notifications',
      `or=(to_user_id.eq.${S.user.id},to_role.eq.${S.user.role})`,
      '*');
    rows?.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    modal(`
      <div class="modal-title">🔔 ${S.lang==='zh'?'通知':'Notifications'}
        <span class="modal-x" onclick="closeModal()">×</span></div>
      ${rows?.length ? rows.slice(0,30).map(n=>`
        <div class="notif-item ${n.read?'':'notif-unread'}" onclick="markRead('${n.id}','${n.order_id||''}')">
          <div class="fw600">${n.title}</div>
          <div class="sub">${n.body||''}</div>
          <div class="sub" style="font-size:10px">${new Date(n.created_at).toLocaleString()}</div>
        </div>`).join('')
      : `<div class="empty">${S.lang==='zh'?'暂无通知':'No notifications'}</div>`}
      <button class="btn btn-dark w100 mt12" onclick="markAllRead()">
        ${S.lang==='zh'?'全部标为已读':'Mark all read'}
      </button>`);
  } catch(e) { toast(e.message,'error'); }
}

async function markRead(id, orderId) {
  try {
    await PATCH('notifications',`id=eq.${id}`,{read:true});
    if (orderId) { closeModal(); /* could nav to order */ }
    loadNotifCount();
  } catch{}
}

async function markAllRead() {
  try {
    await PATCH('notifications',
      `or=(to_user_id.eq.${S.user.id},to_role.eq.${S.user.role})`,
      {read:true});
    closeModal(); loadNotifCount(); toast('All marked read','success');
  } catch{}
}

// ═══ CONFIRM DIALOG HELPER ═══════════════════════════════════
function confirmDialog(title, body) {
  return new Promise(resolve => {
    modal(`
      <div class="modal-title">${title}
        <span class="modal-x" onclick="closeModal()">×</span></div>
      ${body}
      <div class="row-gap mt14">
        <button class="btn btn-gold w100" onclick="closeModal();window._cdRes(true)">✓ Confirm</button>
        <button class="btn btn-dark w100" onclick="closeModal();window._cdRes(false)">Cancel</button>
      </div>`,true);
    window._cdRes = resolve;
  });
}

</script>
<script>

// ═══════════════════════════════════════════════════════════
// PAGE: REVIEW (Sales/Reviewer)
// ═══════════════════════════════════════════════════════════
async function pageReview() {
  html('content', `
    <div class="page-title">✅ ${S.lang==='zh'?'审批订单':'Review Orders'} · <span class="text-t3">${S.user.id}</span></div>
    <div class="filter-row">
      ${['submitted','sales_approved','sales_rejected','all'].map((s,i)=>`
        <button class="btn btn-dark btn-sm filter-btn ${i===0?'factive':''}" id="rf-${s}"
          onclick="loadReviewOrders('${s}')">
          ${s==='all'?(S.lang==='zh'?'全部':'All'):s==='submitted'?(S.lang==='zh'?'待审批':'Pending')
            :s==='sales_approved'?(S.lang==='zh'?'已批':'Approved'):(S.lang==='zh'?'已拒':'Rejected')}
        </button>`).join('')}
    </div>

    <!-- Customer registration approvals -->
    <div id="cust-approvals"></div>

    <div id="review-list"><div class="center-spin"><span class="spin-lg"></span></div></div>`);

  await loadCustApprovals();
  await loadReviewOrders('submitted');
}

async function loadCustApprovals() {
  try {
    const pending = await GET('users', `status=eq.pending&role=eq.customer`, 'id,name,phone,district,created_at');
    if (!pending?.length) { html('cust-approvals',''); return; }
    html('cust-approvals', `
      <div class="card mb12" style="border-color:var(--gold)">
        <div class="card-title">👤 ${S.lang==='zh'?'待审批客户注册':'Pending Customer Approvals'} (${pending.length})</div>
        ${pending.map(u=>`
          <div class="row-between py8 border-b">
            <div>
              <div class="fw700">${u.name}</div>
              <div class="sub">${u.phone} · ${u.district||''}</div>
              <div class="sub" style="font-size:10px">${new Date(u.created_at).toLocaleDateString()}</div>
            </div>
            <div class="row-gap">
              <button class="btn btn-green btn-sm" onclick="approveCust('${u.id}')">✓ ${t('approve')}</button>
              <button class="btn btn-red-soft btn-sm" onclick="rejectCust('${u.id}')">✕</button>
            </div>
          </div>`).join('')}
      </div>`);
  } catch{}
}

async function approveCust(uid) {
  try {
    await PATCH('users', `id=eq.${uid}`, { status:'active', approved_by:S.user.id, approved_at:now(), assigned_to:S.user.id });
    await pushNotif(uid,'','✅ Account approved!','You can now log in and place orders.','system');
    toast('Customer approved!','success');
    loadCustApprovals();
  } catch(e) { toast(e.message,'error'); }
}

async function rejectCust(uid) {
  const reason = prompt(S.lang==='zh'?'拒绝原因（可留空）':'Rejection reason (optional):')||'';
  try {
    await PATCH('users',`id=eq.${uid}`,{status:'rejected'});
    await pushNotif(uid,'','❌ Registration rejected',reason||'Contact admin for details.','system');
    toast('Customer rejected','info');
    loadCustApprovals();
  } catch(e) { toast(e.message,'error'); }
}

async function loadReviewOrders(status) {
  document.querySelectorAll('[id^="rf-"]').forEach(el=>el.classList.remove('factive'));
  $('rf-'+status)?.classList.add('factive');
  try {
    let filter = `assigned_sales=eq.${S.user.id}`;
    if (status!=='all') filter += `&status=eq.${status}`;
    const orders = await GET('orders', filter, '*');
    orders?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
    const el = $('review-list');
    if (!orders?.length) { el.innerHTML=`<div class="empty">${t('no_data')}</div>`; return; }
    el.innerHTML = orders.map(o=>reviewCard(o)).join('');
  } catch(e) { html('review-list',`<div class="err">${e.message}</div>`); }
}

function reviewCard(o) {
  const isDisc = o.has_discount;
  return `
  <div class="card ${isDisc?'card-disc':''} mb10">
    ${isDisc?`<div class="disc-banner">🏷 DISCOUNT ORDER · Finance will be notified to verify</div>`:''}
    <div class="row-between mb8">
      <div style="flex:1;min-width:0">
        <div class="row-gap mb4">
          <span class="order-id">${o.id}</span>
          ${badge(o.status)}
          ${isDisc?'<span class="badge badge-discount">🏷 Disc</span>':''}
        </div>
        <div class="fw600">${o.customer_name}</div>
        <div class="sub">${o.customer_phone} · ${o.container_name}</div>
        <div class="sub">${new Date(o.submitted_at).toLocaleDateString()}
          · ${o.pay_method==='Cash'?'💵':o.pay_method==='M-Pesa'?'📱':o.pay_method==='Bank Transfer'?'🏦':'💳'} ${o.pay_method}</div>
        ${o.note?`<div class="sub notice-inline">📝 ${o.note}</div>`:''}
      </div>
      <div class="order-amt">
        <div class="amt-big ${isDisc?'text-orange':''}">${fmtK(o.total)}</div>
        <div class="sub">TZS</div>
      </div>
    </div>
    ${flowBar(o.status)}
    ${o.reject_reason?`<div class="notice notice-red mt6">❌ ${o.reject_reason}</div>`:''}
    <div class="row-gap mt10">
      <button class="btn btn-dark btn-sm" onclick="showOrderDetail('${o.id}')">▼ ${t('details')}</button>
      ${o.status==='submitted' ? `
        <button class="btn btn-green btn-sm" onclick="doSalesApprove('${o.id}')">✓ ${t('approve')}</button>
        <button class="btn btn-sm" style="background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)"
          onclick="openDiscModal('${o.id}')">🏷 Disc+Approve</button>
        <button class="btn btn-red-soft btn-sm" onclick="openRejectModal('${o.id}')">✕ ${t('reject')}</button>
      ` : ''}
      ${o.status==='sales_approved' ? `
        <button class="btn btn-dark btn-sm" onclick="undoSalesApprove('${o.id}')">↩ Undo</button>
      ` : ''}
    </div>
  </div>`;
}

async function doSalesApprove(oid) {
  try {
    const order = (await GET('orders',`id=eq.${oid}`))?.[0];
    if(!order) throw new Error('Order not found');
    // Lock stock
    const items = await GET('order_items',`order_id=eq.${oid}`);
    for (const i of (items||[])) {
      const s = (await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if (!s) continue;
      if ((s.available||0) < i.qty) throw new Error(`⚠️ Insufficient stock: ${i.product_name} (need ${i.qty}, have ${s.available||0})`);
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        available: (s.available||0)-i.qty,
        reserved:  (s.reserved||0)+i.qty,
        updated_at:now()
      });
    }
    await PATCH('orders',`id=eq.${oid}`,{
      status:'sales_approved', sales_approved_by:S.user.id, sales_approved_at:now()
    });
    await pushNotif(null,'finance',
      `💰 ${order.has_discount?'🏷 DISCOUNT ':''}Order ready for payment`,
      `${oid} · ${order.customer_name} · ${fmtK(order.total)} TZS${order.has_discount?' · VERIFY DISCOUNT':''}`,
      'payment', oid);
    toast('✓ Approved! Stock locked. Finance notified.','success');
    loadReviewOrders('submitted');
  } catch(e) { toast(e.message,'error',4000); }
}

function openRejectModal(oid) {
  modal(`
    <div class="modal-title">✕ ${S.lang==='zh'?'拒绝订单':'Reject Order'}
      <span class="modal-x" onclick="closeModal()">×</span></div>
    <div class="form-g">
      <label class="lbl">${S.lang==='zh'?'拒绝原因':'Reason'} *</label>
      <textarea class="inp" id="rej-reason" rows="3"
        placeholder="${S.lang==='zh'?'告知客户拒绝原因...':'Explain to customer...'}"></textarea>
    </div>
    <div class="row-gap">
      <button class="btn btn-red w100" onclick="doSalesReject('${oid}')">Confirm Reject</button>
      <button class="btn btn-dark w100" onclick="closeModal()">Cancel</button>
    </div>`,true);
}

async function doSalesReject(oid) {
  const reason = $('rej-reason')?.value?.trim();
  if (!reason) return toast('Enter rejection reason','error');
  try {
    await PATCH('orders',`id=eq.${oid}`,{
      status:'sales_rejected', reject_reason:reason,
      sales_approved_by:S.user.id, sales_approved_at:now()
    });
    const order = (await GET('orders',`id=eq.${oid}`))?.[0];
    await pushNotif(order?.customer_id,'','❌ Order rejected',`${oid}: ${reason}`,'order',oid);
    closeModal();
    toast('Order rejected','info');
    loadReviewOrders('submitted');
  } catch(e) { toast(e.message,'error'); }
}

async function openDiscModal(oid) {
  const items = await GET('order_items',`order_id=eq.${oid}`,'*');
  items?.sort((a,b)=>a.id-b.id);
  modal(`
    <div class="modal-title">🏷 ${S.lang==='zh'?'添加折扣并审批':'Discount + Approve'}
      <span class="modal-x" onclick="closeModal()">×</span></div>
    <div class="notice notice-orange mb12">
      ${S.lang==='zh'
        ?'对每个品种输入每包折扣金额（K）。0表示不打折。提交后财务会收到折扣提示。'
        :'Enter discount per bale (K) per item. Leave 0 for no discount. Finance will see discount warning.'}
    </div>
    <div style="max-height:45vh;overflow-y:auto">
      ${(items||[]).map(i=>`
        <div class="row-between py8 border-b">
          <div style="flex:1">
            <div class="fw600">${i.product_name}</div>
            <div class="sub">${Math.round(i.unit_price/1000)}K/bale · qty ${i.qty}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span class="sub">−</span>
            <input class="disc-inp" type="number" min="0" id="di-${i.id}"
              placeholder="0" value="${i.discount_amt>0?Math.round(i.discount_amt/1000):''}">
            <span class="sub">K</span>
          </div>
        </div>`).join('')}
    </div>
    <div class="row-gap mt14">
      <button class="btn btn-orange w100" onclick="applyDiscAndApprove('${oid}','${(items||[]).map(i=>i.id).join(',')}')">
        🏷 Apply Discount & Approve
      </button>
      <button class="btn btn-dark" onclick="closeModal()">Cancel</button>
    </div>`,false);
}

async function applyDiscAndApprove(oid, itemIdsStr) {
  const itemIds = itemIdsStr.split(',');
  try {
    const order = (await GET('orders',`id=eq.${oid}`))?.[0];
    const items = await GET('order_items',`order_id=eq.${oid}`);
    let newTotal=0, newDisc=0;

    for (const i of (items||[])) {
      const discK  = parseFloat($('di-'+i.id)?.value)||0;
      const discTzs = Math.round(discK*1000);
      const fp      = Math.max(0, i.unit_price - discTzs);
      const sub     = r1k(fp*i.qty);
      newTotal += sub; newDisc += discTzs*i.qty;
      await PATCH('order_items',`id=eq.${i.id}`,{discount_amt:discTzs,final_price:fp,subtotal:sub});
    }

    const hasDisc = newDisc>0;
    newTotal = r1k(newTotal); newDisc = r1k(newDisc);

    // Lock stock
    for (const i of (items||[])) {
      const s = (await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if (!s) continue;
      if ((s.available||0) < i.qty) throw new Error(`Insufficient stock: ${i.product_name}`);
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        available:(s.available||0)-i.qty, reserved:(s.reserved||0)+i.qty, updated_at:now()
      });
    }

    await PATCH('orders',`id=eq.${oid}`,{
      status:'sales_approved', has_discount:hasDisc,
      discount_total:newDisc, total:newTotal,
      sales_approved_by:S.user.id, sales_approved_at:now(), sales_modified:true
    });

    await pushNotif(null,'finance',
      `💰${hasDisc?'🏷 DISCOUNT':''} Order approved`,
      `${oid} · ${fmtK(newTotal)} TZS${hasDisc?' · ⚠️ DISCOUNTED PRICES — VERIFY CAREFULLY':''}`,
      'payment', oid);

    closeModal();
    toast('✓ Discount applied & order approved!','success');
    loadReviewOrders('submitted');
  } catch(e) { toast(e.message,'error',4000); }
}

async function undoSalesApprove(oid) {
  if (!confirm(S.lang==='zh'?'撤销审批？将释放锁定库存':'Undo approval? Reserved stock will be released.')) return;
  try {
    const items = await GET('order_items',`order_id=eq.${oid}`);
    for (const i of (items||[])) {
      const s = (await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if (!s) continue;
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        available:(s.available||0)+i.qty, reserved:Math.max(0,(s.reserved||0)-i.qty), updated_at:now()
      });
    }
    await PATCH('orders',`id=eq.${oid}`,{status:'submitted',sales_approved_by:'',sales_approved_at:null});
    toast('Approval undone. Stock released.','info');
    loadReviewOrders('sales_approved');
  } catch(e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════
// PAGE: FINANCE
// ═══════════════════════════════════════════════════════════
async function pageFinance() {
  html('content', `
    <div class="page-title">💰 ${S.lang==='zh'?'收款管理':'Payments'} · <span class="text-t3">${S.user.id}</span></div>
    <div id="fin-summary"><div class="center-spin"><span class="spin-lg"></span></div></div>
    <div class="filter-row mt12">
      ${['sales_approved','all_active','credit_overdue'].map((s,i)=>`
        <button class="btn btn-dark btn-sm filter-btn ${i===0?'factive':''}" id="ff-${s}"
          onclick="loadFinanceOrders('${s}')">
          ${s==='sales_approved'?(S.lang==='zh'?'待收款':'Pending')
            :s==='all_active'?(S.lang==='zh'?'全部':'All Active')
            :(S.lang==='zh'?'赊账逾期':'Credit Overdue')}
        </button>`).join('')}
    </div>
    <div id="fin-list"><div class="center-spin"><span class="spin-lg"></span></div></div>`);
  await loadFinSummary();
  await loadFinanceOrders('sales_approved');
}

async function loadFinSummary() {
  try {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayOrders = await GET('orders',
      `status=eq.finance_confirmed&finance_confirmed_at=gte.${today.toISOString()}`, '*');
    const byMethod = {};
    (todayOrders||[]).forEach(o => {
      const m = o.pay_method_actual||o.pay_method;
      byMethod[m] = (byMethod[m]||0)+(o.total||0);
    });
    const creditPending = await GET('orders',
      `pay_method=eq.Credit&credit_paid=eq.false&status=not.in.(cancelled,sales_rejected)`, 'id,total,customer_name,credit_due_date');
    const overdue = (creditPending||[]).filter(o=>o.credit_due_date&&new Date(o.credit_due_date)<new Date());

    html('fin-summary', `
      <div class="stat-grid">
        ${Object.entries(byMethod).map(([m,v])=>`
          <div class="stat-card">
            <div class="stat-lbl">${m==='Cash'?'💵':m==='M-Pesa'?'📱':m==='Bank Transfer'?'🏦':'💳'} Today · ${m}</div>
            <div class="stat-val">${fmtK(v)}</div>
            <div class="stat-sub">TZS collected</div>
          </div>`).join('')}
        ${!Object.keys(byMethod).length?`
          <div class="stat-card">
            <div class="stat-lbl">Today's Collections</div>
            <div class="stat-val">0</div>
            <div class="stat-sub">No payments yet today</div>
          </div>`:''}
        <div class="stat-card ${overdue.length>0?'stat-warn':''}">
          <div class="stat-lbl">💳 Credit Pending</div>
          <div class="stat-val ${overdue.length>0?'text-orange':''}">${creditPending?.length||0}</div>
          <div class="stat-sub">${fmtK((creditPending||[]).reduce((s,o)=>s+(o.total||0),0))} TZS total
            ${overdue.length>0?`· ⚠️ ${overdue.length} overdue`:''}</div>
        </div>
      </div>`);
  } catch{}
}

async function loadFinanceOrders(status) {
  document.querySelectorAll('[id^="ff-"]').forEach(el=>el.classList.remove('factive'));
  $('ff-'+status)?.classList.add('factive');
  try {
    let filter = '';
    if (status==='sales_approved') filter='status=eq.sales_approved';
    else if (status==='credit_overdue') {
      const today = new Date().toISOString().slice(0,10);
      filter=`pay_method=eq.Credit&credit_paid=eq.false&credit_due_date=lt.${today}&status=not.in.(cancelled,sales_rejected)`;
    } else filter='status=in.(sales_approved,finance_confirmed)';
    const orders = await GET('orders',filter,'*');
    orders?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
    const el=$('fin-list');
    if(!orders?.length){el.innerHTML=`<div class="empty">${t('no_data')}</div>`;return;}
    el.innerHTML=orders.map(o=>financeCard(o)).join('');
  } catch(e){html('fin-list',`<div class="err">${e.message}</div>`);}
}

function financeCard(o) {
  const isDisc=o.has_discount;
  const creditOverdue=o.pay_method==='Credit'&&!o.credit_paid&&o.credit_due_date&&new Date(o.credit_due_date)<new Date();
  return `
  <div class="card ${isDisc?'card-disc':''} ${creditOverdue?'card-overdue':''} mb10">
    ${isDisc?`<div class="disc-banner">🏷 DISCOUNT ORDER — ⚠️ Verify amounts carefully before confirming!</div>`:''}
    <div class="row-between mb8">
      <div style="flex:1;min-width:0">
        <div class="row-gap mb4">
          <span class="order-id">${o.id}</span>
          ${badge(o.status)}
          ${isDisc?'<span class="badge badge-discount">🏷 Disc</span>':''}
          ${creditOverdue?'<span class="badge badge-red">⚠️ Overdue</span>':''}
        </div>
        <div class="fw600">${o.customer_name} · ${o.customer_phone}</div>
        <div class="sub">${o.container_name} · ${new Date(o.submitted_at).toLocaleDateString()}</div>
        <div class="sub">${o.pay_method==='Cash'?'💵':o.pay_method==='M-Pesa'?'📱':o.pay_method==='Bank Transfer'?'🏦':'💳'}
          Requested: ${o.pay_method}</div>
        ${o.credit_due_date?`<div class="sub ${creditOverdue?'text-red':''}">📅 Due: ${new Date(o.credit_due_date).toLocaleDateString()}</div>`:''}
      </div>
      <div class="order-amt">
        <div class="amt-big ${isDisc?'text-orange':''}">${fmtK(o.total)}</div>
        ${o.discount_total>0?`<div class="text-orange" style="font-size:11px">-${fmtK(o.discount_total)} disc</div>`:''}
        <div class="sub">TZS</div>
      </div>
    </div>
    <div class="row-gap">
      <button class="btn btn-dark btn-sm" onclick="showOrderDetail('${o.id}')">▼ ${t('details')}</button>
      ${o.status==='sales_approved'?`<button class="btn btn-green btn-sm" onclick="openFinConfirm('${o.id}')">💰 Confirm Payment</button>`:''}
      ${o.status==='finance_confirmed'&&o.pay_method==='Credit'&&!o.credit_paid?`<button class="btn btn-gold btn-sm" onclick="markCreditPaid('${o.id}')">✓ Mark Credit Paid</button>`:''}
    </div>
  </div>`;
}

async function doFinConfirm(oid) {

async function pageWarehouse() {
  html('content', `
    <div class="page-title">🏭 ${S.lang==='zh'?'仓库管理':'Warehouse'} · <span class="text-t3">${S.user.id}</span></div>
    <div class="filter-row">
      <button class="btn btn-dark btn-sm filter-btn factive" onclick="whTab('ship')">📦 ${S.lang==='zh'?'待发货':'To Ship'}</button>
      <button class="btn btn-dark btn-sm filter-btn" onclick="whTab('done')">✅ ${S.lang==='zh'?'已完成':'Done'}</button>
      <button class="btn btn-dark btn-sm filter-btn" onclick="whTab('inbound')">🚢 ${S.lang==='zh'?'入库':'Inbound'}</button>

}

async function whTab(tab) {
  document.querySelectorAll('.filter-btn').forEach(el=>el.classList.remove('factive'));
  event?.target?.classList.add('factive');
  const el=$('wh-content');
  el.innerHTML=`<div class="center-spin"><span class="spin-lg"></span></div>`;
  try {
    if (tab==='ship') await whShip(el);
    else if (tab==='done') await whDone(el);
    else if (tab==='inbound') await whInbound(el);
    else if (tab==='stock') await whStock(el);
    else if (tab==='stocktake') await whStocktake(el);
  } catch(e){el.innerHTML=`<div class="err">${e.message}</div>`;}
}

async function whShip(el) {
  const orders = await GET('orders','status=eq.finance_confirmed','*');
  orders?.sort((a,b)=>new Date(a.finance_confirmed_at)-new Date(b.finance_confirmed_at));
  if (!orders?.length){el.innerHTML=`<div class="empty">${S.lang==='zh'?'暂无待发货订单':'No orders to ship'}</div>`;return;}
  el.innerHTML=orders.map(o=>`
    <div class="card mb10">
      <div class="row-between mb8">
        <div>
          <div class="row-gap mb4">
            <span class="order-id">${o.id}</span>
            ${badge(o.status)}
          </div>
          <div class="fw600">${o.customer_name}</div>
          <div class="sub">${o.customer_phone}</div>
          <div class="sub">${o.container_name}</div>
          <div class="sub">${o.pay_method_actual||o.pay_method}</div>
        </div>
        <div class="order-amt">
          <div class="amt-big">${fmtK(o.total)}</div>
          <div class="sub">TZS</div>
        </div>
      </div>
      <div class="row-gap">
        <button class="btn btn-dark btn-sm" onclick="showOrderDetail('${o.id}')">▼ Details</button>
        <button class="btn btn-gold btn-sm" onclick="doShip('${o.id}')">📦 Ship Now</button>
      </div>
    </div>`).join('');
}

async function doShip(oid) {
  if(!confirm(S.lang==='zh'?'确认发货？':'Confirm shipment?')) return;
  try {
    const order=(await GET('orders',`id=eq.${oid}`))?.[0];
    const items=await GET('order_items',`order_id=eq.${oid}`);
    for (const i of (items||[])) {
      const s=(await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if(!s) continue;
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        qty:Math.max(0,(s.qty||0)-i.qty),
        reserved:Math.max(0,(s.reserved||0)-i.qty),
        updated_at:now()
      });
    }
    await PATCH('orders',`id=eq.${oid}`,{status:'shipped',shipped_by:S.user.id,shipped_at:now()});
    await pushNotif(order?.customer_id,'','📦 Your order has been shipped!',`${oid} is on its way`,'order',oid);
    toast('✓ Order shipped!','success');
    whTab('ship');
  } catch(e){toast(e.message,'error');}
}

async function whDone(el) {
  const orders=await GET('orders','status=in.(shipped,completed)','*');
  orders?.sort((a,b)=>new Date(b.shipped_at)-new Date(a.shipped_at));
  if(!orders?.length){el.innerHTML=`<div class="empty">${t('no_data')}</div>`;return;}
  el.innerHTML=orders.map(o=>{
    const canUndo = S.user.role==='super'||(o.status!=='completed')||(new Date(o.completed_at)>new Date(Date.now()-3*86400000));
    return `
    <div class="card mb8">
      <div class="row-between">
        <div>
          <span class="order-id">${o.id}</span>
          <div class="sub">${o.customer_name} · ${new Date(o.shipped_at||o.submitted_at).toLocaleDateString()}</div>
        </div>
        <div class="row-gap">
          ${badge(o.status)}
          ${o.status==='shipped'?`<button class="btn btn-green btn-sm" onclick="doComplete('${o.id}')">✓ Complete</button>`:''}
          ${canUndo?`<button class="btn btn-dark btn-sm" onclick="undoShipment('${o.id}')">↩ Undo</button>`:''}
        </div>
      </div>
    </div>`; }).join('');
}

async function doComplete(oid) {
  try {
    await PATCH('orders',`id=eq.${oid}`,{status:'completed',completed_at:now()});
    toast('✓ Order completed!','success'); whTab('done');
  } catch(e){toast(e.message,'error');}
}

async function undoShipment(oid) {
  const order=(await GET('orders',`id=eq.${oid}`))?.[0];
  if(!order) return;
  const threeDaysAgo=new Date(Date.now()-3*86400000);
  if(S.user.role!=='super'&&new Date(order.completed_at||order.shipped_at)<threeDaysAgo)
    return toast('Only super admin can undo orders older than 3 days','error');
  if(!confirm('Undo shipment? Stock will be restored.')) return;
  try {
    const items=await GET('order_items',`order_id=eq.${oid}`);
    for(const i of (items||[])){
      const s=(await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if(!s) continue;
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        qty:(s.qty||0)+i.qty, reserved:(s.reserved||0)+i.qty, updated_at:now()
      });
    }
    await PATCH('orders',`id=eq.${oid}`,{status:'finance_confirmed',shipped_by:'',shipped_at:null,completed_at:null});
    toast('Shipment undone. Stock restored.','info'); whTab('done');
  } catch(e){toast(e.message,'error');}
}

async function whInbound(el) {
  const receipts=await GET('receipts','status=in.(pending,anomaly)','*');
  receipts?.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  el.innerHTML=`
    ${(receipts||[]).length?receipts.map(r=>`
      <div class="card mb10 ${r.anomaly?'card-disc':''}">
        <div class="row-between">
          <div>
            <div class="row-gap mb4">
              <span class="fw800 mono">${r.id}</span>

            </div>

  const receipt=(await GET('receipts',`id=eq.${rid}`))?.[0];

          <th class="tl py6 border-b">Product</th>
          <th class="tr py6 border-b">Actual Count</th>

        <tbody>
          ${(products||[]).map(p=>`
            <tr>
              <td class="py6 border-b">
                <div class="fw600">${p.name}</div>
                <div class="sub">${p.code}</div>
              </td>

      <button class="btn btn-green w100" onclick="doConfirmReceipt('${rid}','${(products||[]).map(p=>p.id).join(',')}','${receipt.container_id}')">
        ✓ Confirm Receipt
      </button>
      <button class="btn btn-dark" onclick="closeModal()">Cancel</button>
    </div>`,false);
}

async function doConfirmReceipt(rid, pidStr, containerId) {
  const pids=pidStr.split(',');
  const anomalyNote=$('rc-anomaly')?.value?.trim()||'';
  const hasAnomaly=!!anomalyNote;
  try {
    for(const pid of pids){
      const qty=parseInt($('rc-'+pid)?.value)||0;
      if(qty<=0) continue;
      const s=(await GET('stock',`product_id=eq.${pid}`))?.[0];
      if(s){
        await PATCH('stock',`product_id=eq.${pid}`,{
          qty:(s.qty||0)+qty, available:(s.available||0)+qty, updated_at:now()
        });
      } else {
        await POST('stock',{product_id:pid,container_id:containerId,qty,available:qty,reserved:0,updated_at:now()});
      }
    }
    await PATCH('receipts',`id=eq.${rid}`,{
      status:hasAnomaly?'anomaly':'confirmed',
      confirmed_by:S.user.id, confirmed_at:now(),
      anomaly:hasAnomaly, anomaly_note:anomalyNote
    });
    // Activate container
    await PATCH('containers',`id=eq.${containerId}`,{status:'active'});
    if(hasAnomaly) await pushNotif(null,'super','⚠️ Inbound anomaly flagged',`Receipt ${rid}: ${anomalyNote}`,'system');
    closeModal();
    toast(hasAnomaly?'Anomaly flagged to super admin. Stock updated.':'✓ Inbound confirmed! Stock updated.', hasAnomaly?'info':'success');
    whTab('inbound');
  } catch(e){toast(e.message,'error');}
}

async function whStock(el) {

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>${S.lang==='zh'?'货柜':'Container'}</th>
          <th>${S.lang==='zh'?'商品':'Product'}</th>
          <th>Code</th>
          <th class="tr">${S.lang==='zh'?'总量':'Total'}</th>
          <th class="tr">${S.lang==='zh'?'可发货':'Avail'}</th>
          <th class="tr">${S.lang==='zh'?'已锁':'Reserved'}</th>
        </tr></thead>
        <tbody>
          ${(stock||[]).map(s=>{
            const p=pm[s.product_id]||{};
            return `<tr>
              <td class="sub">${cm[s.container_id]||s.container_id}</td>
              <td class="fw600">${p.name||s.product_id}</td>
              <td class="mono sub">${p.code||''}</td>
              <td class="tr fw700">${s.qty||0}</td>

            </tr>`; }).join('')}

}

async function whStocktake(el) {
  const containers=await GET('containers','status=eq.active','id,name');
  const history=await GET('stocktake',undefined,'*');
  history?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
  el.innerHTML=`
    <div class="card mb12">
      <div class="card-title">📋 ${S.lang==='zh'?'新建盘点':'New Stocktake'}</div>
      <div class="form-g">
        <label class="lbl">${S.lang==='zh'?'选择货柜':'Select Container'}</label>
        <select class="inp" id="st-cid" onchange="loadStocktakeItems()">
          <option value="">Choose...</option>
          ${(containers||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
      </div>
      <div id="st-items"></div>
    </div>
    <div class="card">
      <div class="card-title">${S.lang==='zh'?'盘点历史':'Stocktake History'}</div>
      ${history?.length ? history.slice(0,20).map(s=>`
        <div class="row-between py8 border-b">
          <div>
            <div class="fw600">${s.product_name}</div>
            <div class="sub">${S.lang==='zh'?'系统':'System'}: ${s.system_qty} · ${S.lang==='zh'?'实盘':'Counted'}: ${s.counted_qty}
              · <span class="${s.diff<0?'text-red':s.diff>0?'text-orange':'text-t3'}">${s.diff>0?'+':''}${s.diff}</span></div>
            <div class="sub" style="font-size:10px">${new Date(s.submitted_at).toLocaleDateString()} · by ${s.submitted_by}</div>
          </div>
          <span class="badge ${s.status==='approved'?'badge-green':s.status==='rejected'?'badge-red':'badge-yellow'}">${s.status}</span>
        </div>`).join('') : `<div class="sub">${t('no_data')}</div>`}
    </div>`;
}

async function loadStocktakeItems() {
  const cid=$('st-cid')?.value; if(!cid) return;
  const products=await GET('products',`container_id=eq.${cid}`,'*');
  const stock=await GET('stock',`container_id=eq.${cid}`);
  const sm={}; (stock||[]).forEach(s=>sm[s.product_id]=s);
  products?.sort((a,b)=>a.sort_order-b.sort_order);
  $('st-items').innerHTML=`
    <div class="table-wrap mt10">
      <table>
        <thead><tr>
          <th>${S.lang==='zh'?'商品':'Product'}</th>
          <th class="tr">${S.lang==='zh'?'系统':'System'}</th>
          <th class="tr">${S.lang==='zh'?'实盘':'Counted'}</th>
          <th class="tr">${S.lang==='zh'?'差异':'Diff'}</th>
        </tr></thead>
        <tbody>
          ${(products||[]).map(p=>{
            const sys=sm[p.id]?.qty||0;
            return `<tr>
              <td><div class="fw600">${p.name}</div><div class="mono sub">${p.code}</div></td>
              <td class="tr fw700">${sys}</td>
              <td class="tr">
                <input type="number" class="step-inp" id="sti-${p.id}" value="${sys}" min="0"
                  style="width:60px" onchange="updateStDiff('${p.id}',${sys})">
              </td>
              <td class="tr" id="std-${p.id}">0</td>
            </tr>`; }).join('')}
        </tbody>
      </table>
    </div>
    <div class="form-g mt10">
      <label class="lbl">${S.lang==='zh'?'盘点备注':'Note'}</label>
      <input class="inp" id="st-note" placeholder="${S.lang==='zh'?'盘点情况说明...':'Stocktake notes...'}">
    </div>
    <button class="btn btn-gold w100 mt10" onclick="submitStocktake('${cid}')">
      📋 ${S.lang==='zh'?'提交盘点':'Submit Stocktake'}
    </button>`;
}

function updateStDiff(pid,sys) {
  const counted=parseInt($('sti-'+pid)?.value)||0;
  const diff=counted-sys;
  const el=$('std-'+pid);
  if(el){el.textContent=(diff>0?'+':'')+diff;el.style.color=diff<0?'var(--red)':diff>0?'var(--orange)':'var(--t3)';}
}

async function submitStocktake(cid) {
  const products=await GET('products',`container_id=eq.${cid}`,'*');
  const stock=await GET('stock',`container_id=eq.${cid}`);
  const sm={}; (stock||[]).forEach(s=>sm[s.product_id]=s);
  const note=$('st-note')?.value||'';
  let hasDiff=false;
  for(const p of (products||[])){
    const counted=parseInt($('sti-'+p.id)?.value)||0;
    const sys=sm[p.id]?.qty||0;
    const diff=counted-sys;
    if(diff!==0) hasDiff=true;
    await POST('stocktake',{
      container_id:cid, product_id:p.id, product_name:p.name,
      system_qty:sys, counted_qty:counted, diff,
      note, submitted_by:S.user.id, submitted_at:now(), status:'pending'
    });
  }
  if(hasDiff){
    await pushNotif(null,'super','⚠️ Stocktake discrepancies',`Container ${cid} has differences. Please review.`,'system');
    toast(S.lang==='zh'?'盘点已提交，差异已上报超管':'Stocktake submitted. Discrepancies flagged to super admin.','info',4000);
  } else {
    toast(S.lang==='zh'?'盘点完成，库存一致':'Stocktake complete. No discrepancies!','success');
  }
  whTab('stocktake');
}

<script>

// ═══════════════════════════════════════════════════════════
// PAGE: ALL ORDERS (Super Admin)
// ═══════════════════════════════════════════════════════════
let _aoStatus = 'all';

async function pageAllOrders() {
  html('content', `
    <div class="page-title">🗂️ ${S.lang==='zh'?'全部订单':'All Orders'}</div>
    <div class="filter-row">
      ${['all','submitted','sales_approved','finance_confirmed','shipped','completed','cancelled','sales_rejected'].map((s,i)=>`
        <button class="btn btn-dark btn-sm filter-btn ${i===0?'factive':''}" id="ao-${s}"
          onclick="filterAllOrders('${s}')">
          ${s==='all'?(S.lang==='zh'?'全部':'All'):(SC[s]?(S.lang==='zh'?SC[s].zh:SC[s].en):s)}
        </button>`).join('')}
    </div>
    <div class="row-gap mt10 mb10">
      <input class="inp" id="ao-search" placeholder="🔍 Order ID / Customer name / Phone..."
        style="flex:1;min-width:160px;padding:8px 12px"
        oninput="debounceSearch()">
      <button class="btn btn-dark btn-sm" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="ao-list"><div class="center-spin"><span class="spin-lg"></span></div></div>`);
  await loadAllOrders();
}

function debounceSearch() {
  clearTimeout(window._dst);
  window._dst = setTimeout(loadAllOrders, 380);
}

async function filterAllOrders(status) {
  _aoStatus = status;
  document.querySelectorAll('[id^="ao-"]').forEach(el=>el.classList.remove('factive'));
  $('ao-'+status)?.classList.add('factive');
  await loadAllOrders();
}

async function loadAllOrders() {
  const search = $('ao-search')?.value?.trim()||'';
  try {
    let filter = _aoStatus!=='all' ? `status=eq.${_aoStatus}` : undefined;
    if (search) {
      const sf = `or=(id.ilike.*${search}*,customer_name.ilike.*${search}*,customer_phone.ilike.*${search}*)`;
      filter = filter ? filter+'&'+sf : sf;
    }
    const orders = await GET('orders', filter, '*');
    orders?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
    const el = $('ao-list');
    if (!orders?.length) { el.innerHTML=`<div class="empty">${t('no_data')}</div>`; return; }
    el.innerHTML = orders.map(o => orderCard(o,'super')).join('');
  } catch(e) { html('ao-list',`<div class="err">${e.message}</div>`); }
}

async function superUndoCancel(oid) {
  const order = (await GET('orders',`id=eq.${oid}`))?.[0];
  if (!order) return;
  const prevStatus = order.shipped_at ? 'finance_confirmed' : 'sales_approved';
  if (!confirm(`Restore order ${oid} to "${prevStatus}"? Stock will be restored.`)) return;
  try {
    const items = await GET('order_items',`order_id=eq.${oid}`);
    for (const i of (items||[])) {
      const s = (await GET('stock',`product_id=eq.${i.product_id}`))?.[0];
      if (!s) continue;
      await PATCH('stock',`product_id=eq.${i.product_id}`,{
        qty: (s.qty||0)+i.qty,
        reserved: (s.reserved||0)+i.qty,
        updated_at: now()
      });
    }
    await PATCH('orders',`id=eq.${oid}`,{
      status: prevStatus,
      cancelled_at: null, cancelled_by: null,
      completed_at: null, shipped_at: null
    });
    toast('Order restored ✓','success');
    loadAllOrders();
  } catch(e) { toast(e.message,'error'); }
}

async function exportCSV() {
  try {
    const orders = await GET('orders', undefined, '*');
    orders?.sort((a,b)=>new Date(b.submitted_at)-new Date(a.submitted_at));
    const headers = ['ID','Customer','Phone','Container','Status','PayMethod','PayActual',
      'Subtotal','Discount','Total','HasDiscount','AssignedSales','FinanceBy',
      'SubmittedAt','ShippedAt','CompletedAt','CancelledAt'];
    const rows = (orders||[]).map(o=>[
      o.id, o.customer_name, o.customer_phone, o.container_name, o.status,
      o.pay_method, o.pay_method_actual||'', o.subtotal||0, o.discount_total||0, o.total||0,
      o.has_discount?'YES':'NO', o.assigned_sales||'', o.finance_confirmed_by||'',
      o.submitted_at||'', o.shipped_at||'', o.completed_at||'', o.cancelled_at||''
    ]);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv,],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `DSM_Orders_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast('CSV exported ✓','success');
  } catch(e) { toast(e.message,'error'); }
}

    // Stock summary per container
    const stock = await GET('stock', undefined, 'container_id,qty,available,reserved');

      sm[s.container_id].available += s.available||0;
